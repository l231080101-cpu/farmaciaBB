<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto - FarmaPlus</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
        .top-bar { background: #2563eb; color: white; padding: 10px 0; font-size: 0.9rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .top-bar-content { display: flex; justify-content: flex-start; gap: 25px; align-items: center; }
        .contact-item { display: flex; align-items: center; gap: 8px; }

        .main-header { background: white; border-bottom: 1px solid #f1f5f9; padding: 20px 0; }
        .main-header-content { display: flex; align-items: center; justify-content: space-between; gap: 30px; }
        
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-box { background: #2563eb; color: white; padding: 8px; border-radius: 8px; font-size: 1.5rem; }
        .logo-title { font-size: 1.8rem; font-weight: 800; color: #2563eb; line-height: 1; }
        .logo-subtitle { font-size: 0.85rem; color: #64748b; }

        .search-bar { flex: 1; position: relative; max-width: 600px; }
        .search-input { width: 100%; padding: 12px 15px 12px 45px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

        .nav-desktop { display: flex; gap: 30px; margin-top: 20px; }
        .nav-link { text-decoration: none; color: #475569; font-weight: 500; padding: 8px 16px; border-radius: 6px; transition: all 0.2s; }
        .nav-link.active { background: #2563eb; color: white; }
        .nav-link:hover:not(.active) { color: #2563eb; background: #eff6ff; }

        .logout-btn { color: #ef4444; font-weight: bold; cursor: pointer; font-size: 0.85rem; padding: 4px 8px; border-radius: 6px; border: 1px solid #fee2e2; transition: 0.2s; }
        .logout-btn:hover { background: #fee2e2; }

        .back-to-index { position: fixed; bottom: 30px; right: 30px; background: #2563eb; color: white; padding: 14px 28px; border-radius: 50px; display: flex; align-items: center; gap: 12px; text-decoration: none; font-weight: 600; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); z-index: 100; transition: transform 0.2s; }
        .back-to-index:hover { transform: translateY(-5px); }
        .map-container { border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid white; height: 100%; min-height: 400px; }
        .form-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #edf2f7; }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="top-bar">
            <div class="container">
                <div class="top-bar-content">
                    <div class="contact-item"><i data-lucide="phone" size="18"></i><span>+52 55 23 69 79 40</span></div>
                    <div class="contact-item"><i data-lucide="map-pin" size="18"></i><span>Calle 67 #16 duplex</span></div>
                    <div class="contact-item"><i data-lucide="clock" size="18"></i><span id="live-clock">Cargando...</span></div>
                </div>
            </div>
        </div>

        <div class="main-header">
            <div class="container">
                <div class="main-header-content">
                    <a href="index.html" class="logo">
                        <div class="logo-box">⚕️</div>
                        <div>
                            <h1 class="logo-title">FarmaPlus</h1>
                            <p class="logo-subtitle">Tu farmacia de confianza</p>
                        </div>
                    </a>

                    <div class="search-bar">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="main-search" placeholder="Buscar productos..." class="search-input" onkeypress="handleSearch(event)" />
                    </div>

                    <div class="flex items-center gap-4" id="user-auth-section">
                        <i data-lucide="layout-grid" class="text-blue-600 cursor-pointer" onclick="window.location.href='admin.html'"></i>
                        
                        <div class="relative cursor-pointer" onclick="window.location.href='carrito.html'">
                            <i data-lucide="shopping-cart" class="text-slate-700"></i>
                            <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
                        </div>

                        <div id="user-auth-placeholder">
                            <div class="flex items-center gap-2 text-slate-700 cursor-pointer" onclick="window.location.href='login.html'">
                                <i data-lucide="user"></i>
                                <span class="text-sm font-medium">Iniciar Sesión</span>
                            </div>
                        </div>
                    </div>
                </div>

                <nav class="nav-desktop">
                    <a href="index.html" class="nav-link">Inicio</a>
                    <a href="catalog.html" class="nav-link">Catálogo</a>
                    <a href="nosotros.html" class="nav-link">Nosotros</a>
                    <a href="contacto.html" class="nav-link active">Contacto</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container py-16">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-extrabold text-slate-900 mb-4">Contáctanos</h2>
            <p class="text-slate-500 text-lg">Estamos aquí para resolver tus dudas.</p>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-stretch">
            <div class="form-card">
                <form id="contact-form" class="flex flex-col gap-6" onsubmit="handleContactSubmit(event)">
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-700 font-semibold">Tu nombre</label>
                        <input type="text" placeholder="Nombre completo" required class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-700 font-semibold">Correo electrónico</label>
                        <input type="email" placeholder="email@ejemplo.com" required class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-700 font-semibold">Mensaje</label>
                        <textarea placeholder="¿En qué podemos ayudarte?" rows="4" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold transition-all transform active:scale-95">Enviar Mensaje</button>
                </form>
            </div>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3762.661074127814!2d-99.1633!3d19.4326!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTnCsDI1JzU3LjQiTiA5OcKwMDknNDcuOSJX!5e0!3m2!1ses!2smx!4v1634567890123" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </main>

    <a href="index.html" class="back-to-index">
        <i data-lucide="arrow-left"></i>
        <span>Regresar al Inicio</span>
    </a>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4';
        const dbClient = supabase.createClient(_url, _key);

        lucide.createIcons();

        async function checkSession() {
            const { data: { session } } = await dbClient.auth.getSession();
            const authPlaceholder = document.getElementById('user-auth-placeholder');

            if (session) {
                const { data: profile } = await dbClient
                    .from('profiles')
                    .select('full_name')
                    .eq('id', session.user.id)
                    .single();

                const name = profile ? profile.full_name : session.user.email;

                authPlaceholder.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-slate-700 font-semibold text-xs flex items-center gap-1">
                            <i data-lucide="user-check" size="14" class="text-blue-600"></i> ${name.split(' ')[0]}
                        </span>
                        <button onclick="logout()" class="logout-btn">Salir</button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        async function logout() {
            await dbClient.auth.signOut();
            localStorage.clear();
            window.location.reload();
        }

        function updateClock() {
            const clockElement = document.getElementById('live-clock');
            const now = new Date();
            const days = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            clockElement.textContent = `${days[now.getDay()]}: ${now.toLocaleTimeString()}`;
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('farmaCart')) || [];
            const totalItems = cart.reduce((acc, item) => acc + item.cantidad, 0);
            document.getElementById('cart-count').textContent = totalItems;
        }

        function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('main-search').value;
                if(query.trim() !== "") {
                    window.location.href = `catalog.html?search=${encodeURIComponent(query)}`;
                }
            }
        }

        function handleContactSubmit(event) {
            event.preventDefault();
            alert("¡Mensaje enviado con éxito! Nos pondremos en contacto pronto.");
            event.target.reset();
        }

        // Init
        setInterval(updateClock, 1000);
        updateClock();
        checkSession();
        updateCartBadge();
    </script>
</body>
</html>
