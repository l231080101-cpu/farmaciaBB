<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - FarmaPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-slate-50">

    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md border border-slate-200">
        <h2 class="text-3xl font-black text-center text-slate-900 mb-8">Crear Cuenta</h2>
        
        <form id="register-form" class="space-y-5">
            <div>
                <label class="block text-sm font-bold mb-1">Nombre</label>
                <input type="text" id="reg-name" class="w-full p-3 border rounded-xl bg-slate-50" required>
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">Correo</label>
                <input type="email" id="reg-email" class="w-full p-3 border rounded-xl bg-slate-50" required>
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">Contraseña</label>
                <input type="password" id="reg-password" class="w-full p-3 border rounded-xl bg-slate-50" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">Registrarse</button>
        </form>

        <p class="text-center mt-6">
            ¿Ya tienes cuenta? 
            <a href="inicio%20de%20sesión.html" class="text-blue-600 font-bold">Inicia Sesión</a>
        </p>
    </div>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4';
        const dbClient = supabase.createClient(_url, _key);

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const name = document.getElementById('reg-name').value;

            const { data, error } = await dbClient.auth.signUp({
                email, password, options: { data: { full_name: name } }
            });

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("¡Usuario creado!");
                window.location.href = 'inicio%20de%20sesión.html';
            }
        });
    </script>
</body>
</html>
