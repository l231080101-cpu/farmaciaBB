<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión - FarmaPlus</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/validator/13.11.0/validator.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <!-- Archivos externos de accesibilidad (opcionales) -->
    <link rel="stylesheet" href="accesibilidad.css">
    <script src="accesibilidad.js" defer></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; transition: background-color 0.3s, color 0.3s; }
        .top-bar { background: #2563eb; color: white; padding: 10px 0; font-size: 0.9rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .top-bar-content { display: flex; justify-content: flex-start; gap: 25px; align-items: center; }
        .contact-item { display: flex; align-items: center; gap: 8px; }
        .main-header { background: white; border-bottom: 1px solid #f1f5f9; padding: 20px 0; transition: background-color 0.3s; }
        .main-header-content { display: flex; align-items: center; justify-content: space-between; gap: 30px; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-box { background: #2563eb; color: white; padding: 8px; border-radius: 8px; font-size: 1.5rem; }
        .logo-title { font-size: 1.8rem; font-weight: 800; color: #2563eb; line-height: 1; }
        
        .login-wrapper { min-height: calc(100vh - 160px); display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; width: 100%; max-width: 450px; position: relative; overflow: hidden; transition: background-color 0.3s, border-color 0.3s; }
        
        .input-group input { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; transition: all 0.2s; background: #f8fafc; outline: none; }
        .input-group input:focus { border-color: #2563eb; background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        #loading-overlay { 
            position: absolute; inset: 0; background: rgba(255, 255, 255, 0.9); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; 
            backdrop-filter: blur(4px);
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #2563eb;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .back-to-index { position: fixed; bottom: 30px; right: 30px; background: #2563eb; color: white; padding: 14px 28px; border-radius: 50px; display: flex; align-items: center; gap: 12px; text-decoration: none; font-weight: 600; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); z-index: 100; }

        /* ========== ESTILOS DE ACCESIBILIDAD ========== */
        #acc-toggle-btn {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 56px;
            height: 56px;
            background-color: #2563eb;
            color: white;
            border-radius: 50%;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s;
            border: none;
        }
        #acc-toggle-btn:hover { transform: scale(1.1); }
        #accessibility-panel {
            position: fixed;
            bottom: 96px;
            left: 24px;
            background: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 16px;
            width: 260px;
            z-index: 99;
            display: none;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }
        #accessibility-panel.active { display: block; }
        .reading-guide {
            display: none;
            position: fixed;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: yellow;
            pointer-events: none;
            z-index: 9999;
        }
        .reading-guide.active { display: block; }
        .dark-mode {
            background-color: #1e293b !important;
            color: #f1f5f9;
        }
        .dark-mode .main-header,
        .dark-mode .top-bar,
        .dark-mode .login-card {
            background-color: #334155 !important;
            border-color: #475569;
        }
        .dark-mode .input-group input,
        .dark-mode .input-group input:focus {
            background-color: #1e293b;
            border-color: #475569;
            color: white;
        }
        .high-contrast {
            background-color: black !important;
            color: yellow !important;
        }
        .high-contrast a, .high-contrast button {
            background-color: yellow !important;
            color: black !important;
            border: 2px solid white;
        }
        .high-contrast .top-bar,
        .high-contrast .main-header,
        .high-contrast .login-card {
            background-color: black !important;
        }
    </style>
</head>
<body>

    <!-- Componentes de accesibilidad -->
    <div id="reading-line" class="reading-guide"></div>

    <div id="acc-toggle-btn" onclick="toggleAccPanel()" title="Menú de Accesibilidad">
        <i data-lucide="accessibility"></i>
    </div>

    <div id="accessibility-panel">
        <h3 class="text-lg font-bold mb-4 border-b border-slate-700 pb-2 text-white">Accesibilidad</h3>
        <div class="flex flex-col gap-4 text-sm text-white">
            <label class="flex justify-between items-center cursor-pointer">
                Modo Oscuro
                <input type="checkbox" id="dark-mode-checkbox" onchange="toggleDarkMode(this.checked)">
            </label>
            <div class="flex flex-col gap-1">
                <span>Tamaño de letra: <b id="text-size-val">100%</b></span>
                <input type="range" id="text-size-slider" min="80" max="150" value="100" class="w-full" oninput="changeTextSize(this.value)">
            </div>
            <label class="flex justify-between items-center cursor-pointer">
                Contraste Alto
                <input type="checkbox" id="high-contrast-checkbox" onchange="toggleHighContrast(this.checked)">
            </label>
            <label class="flex justify-between items-center cursor-pointer">
                Guía de Lectura
                <input type="checkbox" id="reading-guide-checkbox" onchange="toggleReadingGuide(this.checked)">
            </label>
            <label class="flex justify-between items-center cursor-pointer">
                Narrador de Voz
                <input type="checkbox" id="narrator-checkbox" onchange="toggleNarrator(this.checked)">
            </label>
        </div>
    </div>

    <header class="site-header" role="banner">
        <div class="top-bar">
            <div class="container">
                <div class="top-bar-content">
                    <div class="contact-item"><i data-lucide="phone" size="18" aria-hidden="true"></i><span>+52 55 23 69 79 40</span></div>
                    <div class="contact-item"><i data-lucide="map-pin" size="18" aria-hidden="true"></i><span>Calle 67 #16 duplex</span></div>
                    <div class="contact-item"><i data-lucide="clock" size="18" aria-hidden="true"></i><span id="live-clock">Cargando...</span></div>
                </div>
            </div>
        </div>

        <div class="main-header">
            <div class="container">
                <div class="main-header-content">
                    <a href="index.html" class="logo" aria-label="Ir a la página de inicio de FarmaPlus">
                        <div class="logo-box" aria-hidden="true">⚕️</div>
                        <div>
                            <h1 class="logo-title">FarmaPlus</h1>
                            <p class="text-slate-500 text-xs font-semibold">Tu farmacia de confianza</p>
                        </div>
                    </a>
                    <nav class="flex gap-6" aria-label="Navegación principal">
                        <a href="index.html" class="text-slate-600 font-semibold hover:text-blue-600 transition">Inicio</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <main class="login-wrapper" role="main">
        <div class="login-card">
            <div id="loading-overlay" aria-live="polite" aria-busy="false">
                <div class="spinner mb-4" aria-hidden="true"></div>
                <p class="text-blue-600 font-bold animate-pulse">Verificando acceso...</p>
            </div>

            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-full mb-4" aria-hidden="true">
                    <i data-lucide="lock" size="32"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900">Bienvenido</h2>
                <p class="text-slate-500 mt-2">Ingresa tus datos para continuar</p>
            </div>
            
            <form id="login-form" class="space-y-6" aria-label="Formulario de inicio de sesión">
                <div class="input-group">
                    <label for="email" class="block text-sm font-bold text-slate-700 mb-2">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required aria-required="true" autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="password" class="block text-sm font-bold text-slate-700 mb-2">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required aria-required="true" autocomplete="current-password">
                </div>
                
                <p id="error-message" class="hidden text-red-500 text-center text-sm font-bold bg-red-50 p-2 rounded-lg" role="alert" aria-live="assertive"></p>
                
                <button type="submit" id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold text-lg transition-all shadow-lg shadow-blue-100 flex justify-center items-center gap-2">
                    <span>Entrar</span>
                </button>
            </form>

            <div class="text-center mt-8 pt-8 border-t border-slate-100">
                <p class="text-slate-500 text-sm mb-4">¿Eres nuevo en FarmaPlus?</p>
                <a href="registro.html" class="block w-full border-2 border-blue-600 text-blue-600 p-3 rounded-xl font-bold hover:bg-blue-50 transition-all text-center">
                    Registrar nuevo usuario
                </a>
            </div>
        </div>
    </main>

    <a href="index.html" class="back-to-index" aria-label="Regresar a la página de inicio">
        <i data-lucide="arrow-left" aria-hidden="true"></i>
        <span>Regresar al Inicio</span>
    </a>

    <script>
        // ==================== CONFIGURACIÓN SUPABASE ====================
        const supabaseUrl = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4';
        const dbClient = supabase.createClient(supabaseUrl, supabaseKey);

        lucide.createIcons();

        // ==================== FUNCIONES DE ACCESIBILIDAD ====================
        function toggleAccPanel() {
            const panel = document.getElementById('accessibility-panel');
            if (panel) panel.classList.toggle('active');
        }

        function changeTextSize(val) {
            let size = Math.min(150, Math.max(80, Number(val)));
            document.documentElement.style.fontSize = size + "%";
            const label = document.getElementById('text-size-val');
            if (label) label.innerText = size + "%";
            localStorage.setItem('textSize', size);
            const slider = document.getElementById('text-size-slider');
            if (slider) slider.value = size;
        }

        let guideHandler = null;
        function toggleReadingGuide(active) {
            const line = document.getElementById('reading-line');
            if (!line) return;
            if (active) {
                line.classList.add('active');
                if (guideHandler) window.removeEventListener('mousemove', guideHandler);
                guideHandler = (e) => { line.style.top = e.clientY + 'px'; };
                window.addEventListener('mousemove', guideHandler);
            } else {
                line.classList.remove('active');
                if (guideHandler) window.removeEventListener('mousemove', guideHandler);
                guideHandler = null;
            }
            localStorage.setItem('readingGuide', active);
            const chk = document.getElementById('reading-guide-checkbox');
            if (chk && chk.checked !== active) chk.checked = active;
        }

        let narratorActive = false;
        function speakText(e) {
            if (!narratorActive) return;
            let target = e.target;
            let text = target.getAttribute('aria-label') || target.innerText;
            if (text && typeof text === 'string' && text.trim().length > 0 && text.trim().length < 200) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text.trim());
                utterance.lang = 'es-MX';
                window.speechSynthesis.speak(utterance);
            }
        }

        function toggleNarrator(active) {
            narratorActive = active;
            if (active) {
                document.body.addEventListener('click', speakText);
                const msg = new SpeechSynthesisUtterance('Narrador activado. Haga clic en cualquier texto para leerlo.');
                msg.lang = 'es-MX';
                window.speechSynthesis.speak(msg);
            } else {
                document.body.removeEventListener('click', speakText);
                window.speechSynthesis.cancel();
            }
            localStorage.setItem('narrator', active);
            const chk = document.getElementById('narrator-checkbox');
            if (chk && chk.checked !== active) chk.checked = active;
        }

        function toggleDarkMode(active) {
            document.body.classList.toggle('dark-mode', active);
            localStorage.setItem('darkMode', active);
        }

        function toggleHighContrast(active) {
            document.body.classList.toggle('high-contrast', active);
            localStorage.setItem('highContrast', active);
        }

        function restoreAccessibilityPrefs() {
            const savedSize = localStorage.getItem('textSize');
            if (savedSize) changeTextSize(parseInt(savedSize));
            if (localStorage.getItem('darkMode') === 'true') toggleDarkMode(true);
            if (localStorage.getItem('highContrast') === 'true') toggleHighContrast(true);
            if (localStorage.getItem('readingGuide') === 'true') {
                toggleReadingGuide(true);
                const chk = document.getElementById('reading-guide-checkbox');
                if (chk) chk.checked = true;
            }
            if (localStorage.getItem('narrator') === 'true') {
                toggleNarrator(true);
                const chk = document.getElementById('narrator-checkbox');
                if (chk) chk.checked = true;
            }
        }

        // ==================== FUNCIONES DE LOGIN ====================
        setInterval(() => {
            const clock = document.getElementById('live-clock');
            if (clock) clock.textContent = new Date().toLocaleTimeString();
        }, 1000);

        function validateLoginData(rawEmail, rawPassword) {
            const cleanEmail = DOMPurify.sanitize(rawEmail);
            
            if (!validator.isEmail(cleanEmail)) {
                return { valid: false, msg: "El formato de correo no es válido." };
            }
            
            if (validator.isEmpty(rawPassword)) {
                return { valid: false, msg: "La contraseña es requerida." };
            }
            
            return { valid: true, email: cleanEmail };
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const rawEmail = document.getElementById('email').value;
            const rawPassword = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            const btn = document.getElementById('btn-submit');
            const loader = document.getElementById('loading-overlay');

            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = "Validando...";

            const validation = validateLoginData(rawEmail, rawPassword);
            
            if (!validation.valid) {
                errorMsg.textContent = validation.msg;
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = "Entrar";
                return;
            }

            const { data, error } = await dbClient.auth.signInWithPassword({ 
                email: validation.email, 
                password: rawPassword 
            });

            if (error) {
                errorMsg.textContent = "Acceso denegado: Credenciales incorrectas o correo no verificado.";
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = "Entrar";
            } else {
                loader.style.display = 'flex';
                loader.setAttribute('aria-busy', 'true');

                const { data: profile, error: profileError } = await dbClient
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                await new Promise(res => setTimeout(res, 800));

                if (profileError || !profile) {
                    window.location.href = 'index.html';
                } else {
                    if (profile.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }
            }
        });

        // Inicialización de accesibilidad y sincronización de checkboxes
        restoreAccessibilityPrefs();
        if (document.body.classList.contains('dark-mode')) {
            const chk = document.getElementById('dark-mode-checkbox');
            if (chk) chk.checked = true;
        }
        if (document.body.classList.contains('high-contrast')) {
            const chk = document.getElementById('high-contrast-checkbox');
            if (chk) chk.checked = true;
        }
    </script>
</body>
</html>
