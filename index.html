<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FarmaPlus - Eficiencia Farmacéutica</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; margin: 0; }
        .top-bar { background: #2563eb; color: white; padding: 10px 0; font-size: 0.85rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .main-header { background: white; border-bottom: 1px solid #f1f5f9; padding: 20px 0; }
        .logo-title { font-size: 1.8rem; font-weight: 800; color: #2563eb; line-height: 1; }
        
        /* ESTILOS CHATBOT */
        #chat-window { transition: all 0.3s ease; z-index: 1000; }
        .quick-reply-btn { background: white; border: 1px solid #e2e8f0; padding: 8px 16px; border-radius: 20px; font-size: 12px; color: #2563eb; font-weight: 600; transition: all 0.2s; cursor: pointer; }
        .quick-reply-btn:hover { background: #2563eb; color: white; }
        .animate-pop { animation: popIn 0.3s ease-out; }
        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>
    <div id="root">
        <header class="main-header">
            <div class="container flex justify-between items-center">
                <div class="logo-title">FarmaPlus</div>
                <div id="welcome-title" class="text-slate-600 font-semibold">Bienvenido</div>
            </div>
        </header>

        <div id="chat-container" class="fixed bottom-6 right-6 z-[100]">
            <button onclick="toggleChat()" class="bg-blue-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all">
                <i data-lucide="message-circle"></i>
            </button>

            <div id="chat-window" class="hidden absolute bottom-20 right-0 w-80 bg-white rounded-[24px] shadow-2xl border border-slate-100 overflow-hidden flex flex-col">
                <div class="bg-blue-600 p-4 text-white font-bold">Asistente FarmaPlus</div>
                
                <div id="chat-messages" class="h-80 overflow-y-auto p-4 space-y-3 text-[13px] bg-slate-50">
                    <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
                        ¡Hola! Soy su asistente virtual. ¿Cómo puedo ayudarle hoy?
                    </div>
                </div>

                <div id="quick-replies" class="p-3 flex flex-wrap gap-2 bg-slate-50 border-t border-slate-100">
                    <button onclick="sendQuickReply('¿Cómo comprar?')" class="quick-reply-btn">¿Cómo comprar?</button>
                    <button onclick="sendQuickReply('Error en pago')" class="quick-reply-btn">Error en pago</button>
                    <button onclick="sendQuickReply('Ubicación')" class="quick-reply-btn">Ubicación</button>
                    <button onclick="sendQuickReply('Horarios')" class="quick-reply-btn">Horarios</button>
                </div>

                <div id="typing" class="hidden px-4 py-1 text-[10px] text-slate-400">Analizando solicitud...</div>
                
                <div class="p-3 border-t bg-white flex gap-2">
                    <input id="chat-input" type="text" placeholder="Escribe aquí..." class="flex-grow text-sm p-2 bg-slate-100 rounded-xl outline-none" onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="bg-blue-600 text-white p-2 rounded-xl">
                        <i data-lucide="send" size="18"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración Supabase (Mantenida de tu código)
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'TU_KEY_AQUI'; 
        const dbClient = supabase.createClient(_url, _key);

        function toggleChat() { 
            document.getElementById('chat-window').classList.toggle('hidden'); 
            lucide.createIcons(); 
        }

        function sendQuickReply(text) {
            document.getElementById('chat-input').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const msgContainer = document.getElementById('chat-messages');
            const typing = document.getElementById('typing');
            const originalText = input.value.trim();
            
            if (!originalText) return;

            // 1. Mostrar mensaje del usuario
            msgContainer.innerHTML += `<div class="flex justify-end animate-pop"><div class="bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none max-w-[85%]">${originalText}</div></div>`;
            input.value = '';
            msgContainer.scrollTop = msgContainer.scrollHeight;

            typing.classList.remove('hidden');

            setTimeout(() => {
                typing.classList.add('hidden');
                
                // --- LÓGICA DE NORMALIZACIÓN ---
                // Convertimos a minúsculas, quitamos acentos y eliminamos signos ¿?
                const cleanText = originalText.toLowerCase()
                    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") 
                    .replace(/[¿?¡!.,]/g, "");

                let reply = "";

                // --- RESPUESTAS ADECUADAS SEGÚN LA OPCIÓN ---
                if (cleanText.includes("como comprar")) {
                    reply = "🛒 **Pasos para comprar:** \n1. Seleccione sus productos.\n2. Vaya al carrito de compras.\n3. Inicie sesión o regístrese.\n4. Elija su método de pago y ¡listo!";
                } 
                else if (cleanText.includes("error en pago")) {
                    reply = "💳 **Ayuda con el pago:** \nLamentamos el inconveniente. Por favor, verifique que los datos de su tarjeta sean correctos o intente con otro método. Si el problema persiste, contáctenos al +52 55 23 69 79 40.";
                } 
                else if (cleanText.includes("ubicacion") || cleanText.includes("donde estan")) {
                    reply = "📍 **Nuestra sucursal:** \nEstamos ubicados en **Calle 67 #16 duplex**. ¡Esperamos su visita!";
                }
                else if (cleanText.includes("horarios")) {
                    reply = "⏰ **Horarios de atención:** \nLunes a Sábado: 8:00 AM - 10:00 PM \nDomingos: 9:00 AM - 8:00 PM.";
                }
                else if (cleanText.includes("hola")) {
                    reply = "¡Hola! Es un gusto saludarle. ¿Desea consultar nuestro catálogo o tiene dudas sobre un pedido?";
                }
                else {
                    reply = "Entiendo. Para ayudarle mejor, elija una de las opciones de abajo o cuénteme más sobre su duda.";
                }

                // 2. Mostrar respuesta del bot
                msgContainer.innerHTML += `
                    <div class="flex justify-start animate-pop">
                        <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm text-slate-700 border border-slate-100 max-w-[85%]">
                            ${reply.replace(/\n/g, '<br>')}
                        </div>
                    </div>`;
                
                msgContainer.scrollTop = msgContainer.scrollHeight;
                lucide.createIcons();
            }, 700);
        }

        lucide.createIcons();
    </script>
</body>
</html>
