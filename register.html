<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - FarmaPlus</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .top-bar { background: #2563eb; color: white; padding: 10px 0; font-size: 0.9rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .main-header { background: white; border-bottom: 1px solid #f1f5f9; padding: 20px 0; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-box { background: #2563eb; color: white; padding: 8px; border-radius: 8px; font-size: 1.5rem; }
        .logo-title { font-size: 1.8rem; font-weight: 800; color: #2563eb; line-height: 1; }
        .register-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; width: 100%; max-width: 450px; margin: 0 auto; }
        .input-group input { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; outline: none; transition: all 0.2s; }
        .input-group input:focus { border-color: #2563eb; background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body>

    <header>
        <div class="top-bar">
            <div class="container flex justify-between items-center">
                <span><i data-lucide="clock" class="inline" size="14"></i> <span id="live-clock">00:00:00</span></span>
            </div>
        </div>
        <div class="main-header">
            <div class="container">
                <a href="index.html" class="logo">
                    <div class="logo-box">⚕️</div>
                    <div><h1 class="logo-title">FarmaPlus</h1></div>
                </a>
            </div>
        </div>
    </header>

    <main class="flex items-center justify-center py-16 px-4">
        <div class="register-card">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-slate-900">Crear Cuenta</h2>
                <p class="text-slate-500 mt-2">Únete a nosotros</p>
            </div>

            <form id="register-form" class="space-y-5">
                <div class="input-group">
                    <label class="block text-sm font-bold text-slate-700 mb-1">Nombre Completo</label>
                    <input type="text" id="reg-name" placeholder="Tu nombre" required>
                </div>
                <div class="input-group">
                    <label class="block text-sm font-bold text-slate-700 mb-1">Correo Electrónico</label>
                    <input type="email" id="reg-email" placeholder="email@ejemplo.com" required>
                </div>
                <div class="input-group">
                    <label class="block text-sm font-bold text-slate-700 mb-1">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold transition-all">
                    Registrarse
                </button>
            </form>

            <div class="text-center mt-6">
                <p class="text-slate-500 text-sm">¿Ya tienes cuenta? <a href="login.html" class="text-blue-600 font-bold">Inicia Sesión</a></p>
            </div>
        </div>
    </main>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4';
        
        const dbClient = supabase.createClient(_url, _key);

        lucide.createIcons();
        setInterval(() => {
            document.getElementById('live-clock').textContent = new Date().toLocaleTimeString();
        }, 1000);

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const name = document.getElementById('reg-name').value;

            const { data, error } = await dbClient.auth.signUp({
                email, 
                password, 
                options: { data: { full_name: name } }
            });

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("¡Éxito! Ahora puedes iniciar sesión.");
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
