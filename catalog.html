<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - FarmaPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-['Plus_Jakarta_Sans']">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="catalogo.html" class="flex items-center gap-2 text-blue-600 font-extrabold text-2xl">
                <span class="bg-blue-600 text-white p-1.5 rounded-xl">⚕️</span> FarmaPlus
            </a>
            <div class="flex items-center gap-4">
                <a href="catalogo.html" class="text-slate-600 font-bold hover:text-blue-600">Inicio</a>
                <a href="carrito.html" class="relative p-3 rounded-2xl bg-slate-100 text-slate-700 hover:bg-blue-50 hover:text-blue-600 transition-all">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-black border-2 border-white">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex justify-between items-end mb-12">
            <div>
                <h2 class="text-5xl font-black text-slate-900 tracking-tight">Productos</h2>
                <p class="text-slate-500">Calidad farmacéutica garantizada.</p>
            </div>
            <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-2">
                <i data-lucide="search" class="text-slate-400 ml-3"></i>
                <input type="text" id="search-input" placeholder="Buscar medicina..." class="outline-none p-2 text-sm w-64">
            </div>
        </div>
        <div id="productos-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4'; 
        const sb = supabase.createClient(_url, _key);

        let todosLosProductos = [];
        let cart = JSON.parse(localStorage.getItem('farmaCart')) || [];

        async function cargarProductos() {
            const { data, error } = await sb.from('productos').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);
            todosLosProductos = data;
            renderizar(data);
            updateCount();
        }

        function renderizar(lista) {
            const grid = document.getElementById('productos-grid');
            grid.innerHTML = lista.map(p => `
                <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-xl shadow-slate-200/50 flex flex-col">
                    <img src="${p.imagen_url}" class="h-48 w-full object-cover rounded-2xl mb-4 bg-slate-50">
                    <h3 class="font-black text-xl mb-4 text-slate-800">${p.nombre}</h3>
                    <div class="flex justify-between items-center mt-auto">
                        <span class="text-3xl font-black text-blue-600">$${p.precio}</span>
                        <button onclick="addToCart('${p.id}')" class="bg-blue-600 text-white p-4 rounded-2xl hover:bg-blue-700 transition-all active:scale-90">
                            <i data-lucide="plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addToCart(id) {
            const p = todosLosProductos.find(x => x.id === id);
            const exists = cart.find(x => x.id === id);
            if (exists) exists.cantidad++;
            else cart.push({ ...p, cantidad: 1 });
            localStorage.setItem('farmaCart', JSON.stringify(cart));
            updateCount();
        }

        function updateCount() {
            document.getElementById('cart-count').innerText = cart.reduce((acc, i) => acc + i.cantidad, 0);
        }

        window.onload = cargarProductos;
    </script>
</body>
</html>
