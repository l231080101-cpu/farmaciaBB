<!DOCTYPE html>
<html lang="es">
<head>
    <title>Catálogo - FarmaPlus</title>
</head>
<body>
    <main class="container py-12">
        <h2 class="text-3xl font-extrabold mb-8">Nuestros Productos</h2>
        
        <div id="productos-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <p class="text-slate-500">Cargando medicinas...</p>
        </div>
    </main>

    <script type="module">
        import { supabase } from './supabase-config.js'

        async function cargarProductos() {
            // 1. Pedir datos a la tabla 'productos' de Supabase
            const { data: productos, error } = await supabase
                .from('productos')
                .select('*')

            if (error) {
                console.error('Error:', error)
                return;
            }

            const grid = document.getElementById('productos-grid');
            grid.innerHTML = ''; // Limpiar cargando

            // 2. Dibujar cada producto
            productos.forEach(prod => {
                grid.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                        <div class="h-40 bg-slate-100 rounded-xl mb-4 flex items-center justify-center text-4xl">
                            ${prod.categoria === 'medicina' ? '💊' : '🧴'}
                        </div>
                        <h3 class="font-bold text-slate-800">${prod.nombre}</h3>
                        <p class="text-slate-500 text-sm mb-4">${prod.descripcion}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-blue-600 font-extrabold">$${prod.precio}</span>
                            <button onclick="addToCart(${prod.id})" class="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700">
                                <i data-lucide="shopping-cart"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        window.onload = cargarProductos;
    </script>
</body>
</html>
