<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - FarmaPlus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="stylefarma.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<header>
    <!-- Puedes copiar aquí el mismo header de index.html -->
</header>

<div class="catalog-page">
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Catálogo de Productos</h1>
            <p class="page-description">
                Encuentra todos nuestros medicamentos genéricos y productos de salud
            </p>
        </div>

        <div class="filter-section">
            <div class="filter-header">
                <i data-lucide="filter"></i>
                <h3>Filtrar por categoría</h3>
            </div>
            <div class="filter-buttons"></div>
        </div>

        <div class="products-grid" id="catalog-products-grid"></div>

        <div class="product-count"></div>
    </div>
</div>

<script>
    lucide.createIcons();
</script>

</body>
</html>
