<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - FarmaPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body>

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-blue-600 font-extrabold text-2xl">
                <span class="bg-blue-600 text-white p-1 rounded-lg">⚕️</span> FarmaPlus
            </a>
            <div class="flex gap-4">
                <a href="index.html" class="text-slate-600 font-semibold hover:text-blue-600">Inicio</a>
                <button class="relative">
                    <i data-lucide="shopping-cart" class="text-slate-700"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-4">
            <div>
                <h2 class="text-4xl font-extrabold text-slate-900">Nuestros Productos</h2>
                <p class="text-slate-500 mt-2">Calidad farmacéutica garantizada en cada pedido.</p>
            </div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-slate-200 flex items-center gap-2">
                <i data-lucide="search" class="text-slate-400 ml-2"></i>
                <input type="text" id="search-input" placeholder="Buscar medicina..." class="outline-none bg-transparent p-2 text-sm w-64">
            </div>
        </div>
        
        <div id="productos-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full flex flex-col items-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                <p class="mt-4 text-slate-500 font-medium">Conectando con la farmacia...</p>
            </div>
        </div>
    </main>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4';
        const sb = supabase.createClient(_url, _key);

        let todosLosProductos = [];

        async function cargarProductos() {
            const { data: productos, error } = await sb
                .from('productos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error al cargar productos:', error);
                return;
            }

            todosLosProductos = productos;
            renderizarProductos(productos);
        }

        function renderizarProductos(lista) {
            const grid = document.getElementById('productos-grid');
            
            if (lista.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-10 text-slate-400 font-bold">No se encontraron productos en esta categoría.</p>`;
                return;
            }

            grid.innerHTML = lista.map(p => `
                <div class="product-card bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-200/50 overflow-hidden flex flex-col">
                    <div class="relative h-56 bg-slate-100">
                        <img src="${p.imagen_url || 'https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?q=80&w=500'}" 
                             class="w-full h-full object-cover" 
                             alt="${p.nombre}"
                             onerror="this.src='https://via.placeholder.com/500x500?text=Medicamento'">
                        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-blue-600 font-bold text-xs">
                            Disponible
                        </div>
                    </div>
                    <div class="p-6 flex-grow">
                        <h3 class="font-extrabold text-slate-800 text-lg mb-1 leading-tight">${p.nombre}</h3>
                        <p class="text-slate-500 text-sm line-clamp-2 mb-4">${p.descripcion || 'Sin descripción disponible.'}</p>
                        <div class="flex justify-between items-center mt-auto">
                            <div class="flex flex-col">
                                <span class="text-xs text-slate-400 font-bold uppercase tracking-wider">Precio</span>
                                <span class="text-2xl font-black text-blue-600">$${p.precio}</span>
                            </div>
                            <button onclick="addToCart('${p.id}')" class="bg-blue-600 hover:bg-blue-700 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 transition-all active:scale-95">
                                <i data-lucide="plus" size="24"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- FILTRO DE BÚSQUEDA ---
        document.getElementById('search-input').addEventListener('input', (e) => {
            const busqueda = e.target.value.toLowerCase();
            const filtrados = todosLosProductos.filter(p => 
                p.nombre.toLowerCase().includes(busqueda) || 
                p.descripcion.toLowerCase().includes(busqueda)
            );
            renderizarProductos(filtrados);
        });

        // --- SIMULACIÓN DE CARRITO ---
        function addToCart(id) {
            const count = document.getElementById('cart-count');
            count.innerText = parseInt(count.innerText) + 1;
            
            // Animación pequeña
            count.classList.add('scale-125', 'bg-green-500');
            setTimeout(() => count.classList.remove('scale-125', 'bg-green-500'), 300);
            
            console.log('Producto añadido:', id);
        }

        window.onload = () => {
            cargarProductos();
            lucide.createIcons();
        };
    </script>
</body>
</html>
