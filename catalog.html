<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - FarmaPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="catalog.html" class="flex items-center gap-2 text-blue-600 font-extrabold text-2xl tracking-tighter">
                <span class="bg-blue-600 text-white p-1.5 rounded-xl shadow-lg shadow-blue-200">⚕️</span> FarmaPlus
            </a>

            <div class="flex items-center gap-6">
                <nav class="hidden md:flex gap-8">
                    <a href="catalog.html" class="text-blue-600 font-bold">Catálogo</a>
                    <a href="nosotros.html" class="text-slate-500 font-bold hover:text-blue-600 transition-colors">Nosotros</a>
                </nav>
                
                <a href="carrito.html" class="relative p-3 rounded-2xl bg-slate-100 text-slate-700 hover:bg-blue-50 hover:text-blue-600 transition-all">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-black border-2 border-white">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
            <div>
                <h1 class="text-5xl font-black text-slate-900 tracking-tight mb-2">Nuestros Productos</h1>
                <p class="text-slate-500 font-medium">Calidad farmacéutica a un clic de distancia.</p>
            </div>
            
            <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-2 w-full md:w-auto">
                <i data-lucide="search" class="text-slate-400 ml-3"></i>
                <input type="text" id="search-input" placeholder="Buscar medicina..." class="outline-none p-2 text-sm w-full md:w-64 bg-transparent">
            </div>
        </div>

        <div id="productos-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        // Configuración de Supabase (Credenciales del usuario)
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4'; 
        const sb = supabase.createClient(_url, _key);

        let todosLosProductos = [];
        let cart = JSON.parse(localStorage.getItem('farmaCart')) || [];

        // Cargar productos desde la base de datos
        async function cargarProductos() {
            const { data, error } = await sb.from('productos').select('*').order('nombre', { ascending: true });
            
            if (error) {
                console.error("Error al obtener productos:", error);
                return;
            }
            
            todosLosProductos = data;
            renderizar(data);
            updateCount();
        }

        // Mostrar productos en el HTML
        function renderizar(lista) {
            const grid = document.getElementById('productos-grid');
            
            if (lista.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-bold">No se encontraron resultados para tu búsqueda.</div>';
                return;
            }

            grid.innerHTML = lista.map(p => `
                <div class="product-card bg-white p-6 rounded-[32px] border border-slate-100 shadow-xl shadow-slate-200/40 flex flex-col">
                    <div class="aspect-square w-full mb-4 overflow-hidden rounded-2xl bg-slate-50 border border-slate-50">
                        <img src="${p.imagen_url}" class="w-full h-full object-contain p-4" alt="${p.nombre}">
                    </div>
                    <div class="flex-grow">
                        <h3 class="font-black text-xl mb-1 text-slate-800 capitalize">${p.nombre}</h3>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-4">Disponible</p>
                    </div>
                    <div class="flex justify-between items-center mt-4">
                        <div class="flex flex-col">
                            <span class="text-3xl font-black text-blue-600">$${p.precio}</span>
                        </div>
                        <button onclick="addToCart('${p.id}')" class="bg-blue-600 text-white p-4 rounded-2xl hover:bg-blue-700 transition-all active:scale-90 shadow-lg shadow-blue-100">
                            <i data-lucide="plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Buscador reactivo
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtrados = todosLosProductos.filter(p => p.nombre.toLowerCase().includes(term));
            renderizar(filtrados);
        });

        // Añadir al carrito (Local Storage)
        function addToCart(id) {
            const producto = todosLosProductos.find(x => x.id === id);
            const itemExistente = cart.find(x => x.id === id);
            
            if (itemExistente) {
                itemExistente.cantidad++;
            } else {
                cart.push({ ...producto, cantidad: 1 });
            }
            
            localStorage.setItem('farmaCart', JSON.stringify(cart));
            updateCount();
            
            // Animación/Feedback visual
            const btn = event.currentTarget;
            btn.classList.replace('bg-blue-600', 'bg-green-500');
            setTimeout(() => btn.classList.replace('bg-green-500', 'bg-blue-600'), 800);
        }

        // Actualizar número en el icono del carrito
        function updateCount() {
            const total = cart.reduce((acc, item) => acc + item.cantidad, 0);
            document.getElementById('cart-count').innerText = total;
        }

        window.onload = cargarProductos;
    </script>
</body>
</html>
