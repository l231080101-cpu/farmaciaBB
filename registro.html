<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Cuenta - FarmaPlus</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; }
        .register-card { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
            border: 1px solid #e2e8f0; 
            width: 100%; 
            max-width: 450px; 
        }
        .input-group input { 
            width: 100%; 
            padding: 12px 16px; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            transition: all 0.2s; 
            background: #f8fafc; 
            outline: none; 
        }
        .input-group input:focus { 
            border-color: #2563eb; 
            background: white; 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); 
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="register-card">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-full mb-4">
                <i data-lucide="user-plus" size="32"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900">Crear Cuenta</h1>
            <p class="text-slate-500 mt-2">Únete a la familia FarmaPlus</p>
        </div>
        
        <form id="register-form" class="space-y-6">
            <div class="input-group">
                <label for="reg-name" class="block text-sm font-bold text-slate-700 mb-2">Nombre Completo</label>
                <input type="text" id="reg-name" placeholder="Tu nombre y apellido" required>
            </div>

            <div class="input-group">
                <label for="reg-email" class="block text-sm font-bold text-slate-700 mb-2">Correo Electrónico</label>
                <input type="email" id="reg-email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="input-group">
                <label for="reg-password" class="block text-sm font-bold text-slate-700 mb-2">Contraseña</label>
                <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" minlength="6" required>
            </div>
            
            <p id="reg-error" class="hidden text-red-500 text-center text-sm font-bold bg-red-50 p-2 rounded-lg"></p>

            <button type="submit" id="reg-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold text-lg transition-all shadow-lg shadow-blue-100 flex justify-center items-center gap-2">
                <span>Registrarse</span>
            </button>
        </form>
    </div>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4';
        const dbClient = supabase.createClient(_url, _key);

        lucide.createIcons();

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const errorMsg = document.getElementById('reg-error');
            const btn = document.getElementById('reg-btn');

            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = "Creando cuenta...";

            const { data, error } = await dbClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { full_name: name }
                }
            });

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = "Registrarse";
            } else {
                // Dentro del else del registro exitoso:
alert("¡Registro exitoso! Por favor, inicia sesión.");
window.location.href = 'inicio%20de%20sesión.html';
            }
        });
    </script>
</body>
</html>
