<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - FarmaPlus</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/validator/13.11.0/validator.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; }
        .top-bar { background: #2563eb; color: white; padding: 10px 0; font-size: 0.9rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .top-bar-content { display: flex; justify-content: flex-start; gap: 25px; align-items: center; }
        .contact-item { display: flex; align-items: center; gap: 8px; }
        .main-header { background: white; border-bottom: 1px solid #f1f5f9; padding: 20px 0; }
        .main-header-content { display: flex; align-items: center; justify-content: space-between; gap: 30px; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-box { background: #2563eb; color: white; padding: 8px; border-radius: 8px; font-size: 1.5rem; }
        .logo-title { font-size: 1.8rem; font-weight: 800; color: #2563eb; line-height: 1; }
        
        .login-wrapper { min-height: calc(100vh - 160px); display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; width: 100%; max-width: 500px; position: relative; overflow: hidden; }
        
        .input-group input { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; transition: all 0.2s; background: #f8fafc; outline: none; }
        .input-group input:focus { border-color: #2563eb; background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        #loading-overlay { 
            position: absolute; inset: 0; background: rgba(255, 255, 255, 0.9); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; 
            backdrop-filter: blur(4px);
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #2563eb;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="top-bar">
            <div class="container">
                <div class="top-bar-content">
                    <div class="contact-item"><i data-lucide="phone" size="18"></i><span>+52 55 23 69 79 40</span></div>
                    <div class="contact-item"><i data-lucide="map-pin" size="18"></i><span>Calle 67 #16 duplex</span></div>
                </div>
            </div>
        </div>

        <div class="main-header">
            <div class="container">
                <div class="main-header-content">
                    <a href="index.html" class="logo">
                        <div class="logo-box">⚕️</div>
                        <div>
                            <h1 class="logo-title">FarmaPlus</h1>
                            <p class="text-slate-500 text-xs font-semibold">Tu farmacia de confianza</p>
                        </div>
                    </a>
                    <nav class="flex gap-6">
                        <a href="index.html" class="text-slate-600 font-semibold hover:text-blue-600 transition">Inicio</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <main class="login-wrapper">
        <div class="login-card">
            <div id="loading-overlay">
                <div class="spinner mb-4"></div>
                <p id="loading-text" class="text-blue-600 font-bold animate-pulse">Procesando...</p>
            </div>

            <div id="register-step">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-full mb-4">
                        <i data-lucide="user-plus" size="32"></i>
                    </div>
                    <h2 class="text-3xl font-extrabold text-slate-900">Crear Cuenta</h2>
                    <p class="text-slate-500 mt-2">Únete a FarmaPlus de forma segura</p>
                </div>
                
                <form id="register-form" class="space-y-4">
                    <div class="input-group">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Nombre Completo</label>
                        <input type="text" id="fullname" placeholder="Ej. Juan Pérez" required>
                    </div>
                    <div class="input-group">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Contraseña</label>
                        <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
                    </div>
                    <div class="input-group">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Confirmar Contraseña</label>
                        <input type="password" id="confirm-password" placeholder="Repite tu contraseña" required>
                    </div>
                    
                    <p id="error-message" class="hidden text-red-500 text-center text-sm font-bold bg-red-50 p-2 rounded-lg"></p>
                    
                    <button type="submit" id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold text-lg transition-all shadow-lg shadow-blue-100 flex justify-center items-center gap-2 mt-4">
                        <span>Registrarse</span>
                    </button>
                </form>

                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-slate-200"></span></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400 font-semibold">O también</span></div>
                </div>

                <button onclick="loginConGoogle()" class="w-full flex items-center justify-center gap-3 border-2 border-slate-200 p-3 rounded-xl font-bold hover:bg-slate-50 hover:border-slate-300 transition-all">
                    <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
                    <span>Continuar con Google</span>
                </button>
            </div>

            <div id="otp-step" class="hidden text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-green-50 text-green-600 rounded-full mb-4">
                    <i data-lucide="mail-check" size="32"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900 text-center mb-2">Verifica tu Email</h2>
                <p class="text-slate-500 text-sm mb-6">Hemos enviado un código de 6 dígitos a <br><b id="display-email" class="text-blue-600"></b></p>
                
                <div class="space-y-4">
                    <div class="input-group">
                        <input type="text" id="otp-code" placeholder="000000" maxlength="6" class="text-center text-3xl tracking-[0.5em] font-black !bg-white border-2 border-blue-100 focus:border-blue-600">
                    </div>
                    <p id="otp-error" class="hidden text-red-500 text-sm font-bold bg-red-50 p-2 rounded-lg"></p>
                    <button onclick="verificarCodigo()" class="w-full bg-green-600 hover:bg-green-700 text-white p-4 rounded-xl font-bold text-lg transition-all shadow-lg shadow-green-100">
                        Confirmar Código
                    </button>
                    <button onclick="location.reload()" class="text-slate-400 text-sm hover:underline">¿Te equivocaste de correo? Volver</button>
                </div>
            </div>

            <div class="text-center mt-6 pt-6 border-t border-slate-100">
                <p class="text-slate-500 text-sm mb-4">¿Ya tienes una cuenta?</p>
                <a href="login.html" class="block w-full border-2 border-blue-600 text-blue-600 p-3 rounded-xl font-bold hover:bg-blue-50 transition-all text-center">
                    Iniciar Sesión
                </a>
            </div>
        </div>
    </main>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'sb_publishable_8w3s1o-fJk-6wALwWWxDFQ_LI_ys5xs';
        const dbClient = supabase.createClient(_url, _key);

        lucide.createIcons();

        // FUNCIÓN MEJORADA Y CORREGIDA PARA GOOGLE AUTH
        async function loginConGoogle() {
            const loader = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');
            
            loader.style.display = 'flex';
            loadingText.textContent = "Conectando con Google...";

            // CAMBIO CLAVE: Forzamos la URL de Vercel para evitar que regrese a localhost
            const siteURL = "https://farmaciabb.vercel.app/index.html";

            const { data, error } = await dbClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: siteURL,
                    queryParams: {
                        access_type: 'offline',
                        prompt: 'select_account',
                    },
                }
            });

            if (error) {
                loader.style.display = 'none';
                alert("Error de Google: " + error.message);
            }
        }

        // Validación y registro manual
        function validateRegistrationData(rawName, rawEmail, rawPassword, rawConfirm) {
            const cleanName = DOMPurify.sanitize(rawName.trim());
            const cleanEmail = DOMPurify.sanitize(rawEmail.trim());
            if (validator.isEmpty(cleanName)) return { valid: false, msg: "El nombre no puede estar vacío." };
            if (!validator.isEmail(cleanEmail)) return { valid: false, msg: "El correo no es válido." };
            if (!validator.isLength(rawPassword, { min: 8 })) return { valid: false, msg: "Mínimo 8 caracteres." };
            if (rawPassword !== rawConfirm) return { valid: false, msg: "Las contraseñas no coinciden." };
            return { valid: true, name: cleanName, email: cleanEmail };
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const rawName = document.getElementById('fullname').value;
            const rawEmail = document.getElementById('email').value;
            const rawPassword = document.getElementById('password').value;
            const rawConfirm = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-message');
            const btn = document.getElementById('btn-submit');
            const loader = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');

            errorMsg.classList.add('hidden');
            const validation = validateRegistrationData(rawName, rawEmail, rawPassword, rawConfirm);
            
            if (!validation.valid) {
                errorMsg.textContent = validation.msg;
                errorMsg.classList.remove('hidden');
                return;
            }

            loader.style.display = 'flex';
            loadingText.textContent = "Creando cuenta segura...";
            btn.disabled = true;

            const { data, error } = await dbClient.auth.signUp({
                email: validation.email,
                password: rawPassword,
                options: {
                    data: { full_name: validation.name, role: 'usuario' }
                }
            });

            loader.style.display = 'none';

            if (error) {
                errorMsg.textContent = "Error: " + error.message;
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
            } else {
                document.getElementById('display-email').textContent = validation.email;
                document.getElementById('register-step').classList.add('hidden');
                document.getElementById('otp-step').classList.remove('hidden');
                lucide.createIcons();
            }
        });

        async function verificarCodigo() {
            const email = document.getElementById('email').value;
            const token = document.getElementById('otp-code').value;
            const otpError = document.getElementById('otp-error');
            const loader = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');

            otpError.classList.add('hidden');
            if (token.length !== 6) {
                otpError.textContent = "Ingresa los 6 dígitos.";
                otpError.classList.remove('hidden');
                return;
            }

            loader.style.display = 'flex';
            loadingText.textContent = "Verificando código...";

            const { data, error } = await dbClient.auth.verifyOtp({
                email: email,
                token: token,
                type: 'signup'
            });

            loader.style.display = 'none';

            if (error) {
                otpError.textContent = "Código inválido o expirado.";
                otpError.classList.remove('hidden');
            } else {
                alert("¡Cuenta verificada con éxito! Bienvenido a FarmaPlus.");
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
