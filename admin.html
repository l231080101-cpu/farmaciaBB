<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - FarmaPlus</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 3px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-bottom border-slate-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center gap-2 font-bold text-blue-600 text-xl">
                <i data-lucide="shield-check"></i> FarmaPlus Admin
            </div>
            <a href="index.html" class="text-slate-500 hover:text-slate-800 flex items-center gap-1 text-sm">
                <i data-lucide="external-link" size="16"></i> Ver Sitio
            </a>
        </div>
        <div class="max-w-7xl mx-auto px-4 flex gap-8">
            <button onclick="switchTab('usuarios')" class="tab-btn active py-4 font-semibold transition" id="btn-usuarios">Usuarios</button>
            <button onclick="switchTab('productos')" class="tab-btn py-4 font-semibold transition" id="btn-productos">Productos</button>
            <button onclick="switchTab('buzon')" class="tab-btn py-4 font-semibold transition" id="btn-buzon">Buzón de Contacto</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <section id="tab-usuarios" class="tab-content active">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Gestión de Usuarios</h2>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 font-bold">Nombre</th>
                            <th class="p-4 font-bold">Rol</th>
                            <th class="p-4 font-bold text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-usuarios"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-productos" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Inventario de Productos</h2>
                <button onclick="openProductModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2">
                    <i data-lucide="plus" size="18"></i> Nuevo Producto
                </button>
            </div>
            <div id="grid-productos-admin" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </section>

        <section id="tab-buzon" class="tab-content">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Mensajes Recibidos</h2>
            <div id="lista-mensajes" class="space-y-4">
                </div>
        </section>

    </main>

    <div id="modal-producto" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md">
            <h3 id="modal-title" class="text-xl font-bold mb-4">Agregar Producto</h3>
            <form id="form-producto" class="space-y-4">
                <input type="hidden" id="edit-id">
                <input type="text" id="p-nombre" placeholder="Nombre del producto" class="w-full p-2 border rounded-lg" required>
                <input type="number" step="0.01" id="p-precio" placeholder="Precio" class="w-full p-2 border rounded-lg" required>
                <textarea id="p-desc" placeholder="Descripción" class="w-full p-2 border rounded-lg"></textarea>
                <input type="url" id="p-img" placeholder="URL de la imagen" class="w-full p-2 border rounded-lg">
                <div class="flex gap-2">
                    <button type="button" onclick="closeProductModal()" class="flex-1 bg-slate-100 py-2 rounded-lg">Cancelar</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'TU_ANON_KEY'; 
        const sb = supabase.createClient(_url, _key);

        // --- LÓGICA DE NAVEGACIÓN ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            
            if(tabId === 'usuarios') loadUsers();
            if(tabId === 'productos') loadProducts();
            if(tabId === 'buzon') loadMessages();
        }

        // --- GESTIÓN DE USUARIOS ---
        async function loadUsers() {
            const { data: users } = await sb.from('profiles').select('*');
            const container = document.getElementById('lista-usuarios');
            container.innerHTML = users.map(u => `
                <tr class="border-b border-slate-100 hover:bg-slate-50">
                    <td class="p-4 font-medium">${u.full_name}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs font-bold ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">${u.role.toUpperCase()}</span></td>
                    <td class="p-4 text-right flex justify-end gap-2">
                        <button onclick="changeRole('${u.id}', '${u.role}')" class="text-blue-600 text-sm font-bold">Cambiar Rol</button>
                        <button onclick="deleteUser('${u.id}')" class="text-red-500"><i data-lucide="trash-2" size="18"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        async function changeRole(id, currentRole) {
            const newRole = currentRole === 'admin' ? 'usuario' : 'admin';
            await sb.from('profiles').update({ role: newRole }).eq('id', id);
            loadUsers();
        }

        // --- GESTIÓN DE PRODUCTOS ---
        async function loadProducts() {
            const { data: prods } = await sb.from('productos').select('*');
            const container = document.getElementById('grid-productos-admin');
            container.innerHTML = prods.map(p => `
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <img src="${p.imagen_url}" class="w-16 h-16 object-cover rounded-lg">
                    <div class="flex-grow">
                        <h4 class="font-bold text-sm">${p.nombre}</h4>
                        <p class="text-blue-600 font-bold">$${p.precio}</p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="editProduct('${p.id}')" class="text-slate-400 hover:text-blue-600"><i data-lucide="edit" size="18"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="text-slate-400 hover:text-red-600"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Lógica para guardar/editar productos
        document.getElementById('form-producto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const payload = {
                nombre: document.getElementById('p-nombre').value,
                precio: document.getElementById('p-precio').value,
                descripcion: document.getElementById('p-desc').value,
                imagen_url: document.getElementById('p-img').value
            };

            if(id) {
                await sb.from('productos').update(payload).eq('id', id);
            } else {
                await sb.from('productos').insert([payload]);
            }
            closeProductModal();
            loadProducts();
        });

        // --- BUZÓN DE CONTACTO ---
        async function loadMessages() {
            // Asume que tienes una tabla llamada 'contacto'
            const { data: msgs } = await sb.from('contacto').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('lista-mensajes');
            if(!msgs || msgs.length === 0) {
                container.innerHTML = "<p class='text-slate-500'>No hay mensajes nuevos.</p>";
                return;
            }
            container.innerHTML = msgs.map(m => `
                <div class="bg-white p-6 rounded-xl border-l-4 border-blue-600 shadow-sm">
                    <div class="flex justify-between mb-2">
                        <span class="font-bold text-slate-800">${m.nombre} (${m.email})</span>
                        <span class="text-xs text-slate-400">${new Date(m.created_at).toLocaleDateString()}</span>
                    </div>
                    <p class="text-slate-600">${m.mensaje}</p>
                </div>
            `).join('');
        }

        // --- FUNCIONES AUXILIARES ---
        function openProductModal() { 
            document.getElementById('form-producto').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('modal-producto').classList.remove('hidden'); 
        }
        function closeProductModal() { document.getElementById('modal-producto').classList.add('hidden'); }
        
        async function deleteProduct(id) {
            if(confirm('¿Seguro que quieres eliminar este producto?')) {
                await sb.from('productos').delete().eq('id', id);
                loadProducts();
            }
        }

        window.onload = () => {
            lucide.createIcons();
            loadUsers();
        };
    </script>
</body>
</html>
