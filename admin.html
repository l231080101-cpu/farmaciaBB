<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Registro de Productos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-lg">
        <h2 class="text-2xl font-bold mb-6 text-slate-800">Registrar Nuevo Producto</h2>
        
        <form id="product-form" class="space-y-4">
            <div>
                <label class="block text-sm font-bold mb-1">Nombre del Producto</label>
                <input type="text" id="p-name" class="w-full p-2 border rounded-lg" placeholder="Ej. Paracetamol" required>
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">Precio</label>
                <input type="number" step="0.01" id="p-price" class="w-full p-2 border rounded-lg" placeholder="0.00" required>
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">Descripción</label>
                <textarea id="p-desc" class="w-full p-2 border rounded-lg" placeholder="Breve descripción..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">URL de la Imagen</label>
                <input type="url" id="p-img" class="w-full p-2 border rounded-lg" placeholder="https://imagen.com/foto.jpg">
            </div>
            <button type="submit" id="btn-save" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition">
                Guardar Producto
            </button>
        </form>
    </div>

    <script>
        // Configuración rápida de Supabase (Usa tus credenciales)
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'TU_ANON_KEY_AQUI'; 
        const supabase = window.supabase.createClient(_url, _key);

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerText = "Guardando...";

            const product = {
                nombre: document.getElementById('p-name').value,
                precio: parseFloat(document.getElementById('p-price').value),
                descripcion: document.getElementById('p-desc').value,
                imagen_url: document.getElementById('p-img').value
            };

            const { error } = await supabase.from('productos').insert([product]);

            if (error) {
                alert("Error al guardar: " + error.message);
            } else {
                alert("¡Producto guardado exitosamente!");
                document.getElementById('product-form').reset();
            }
            btn.disabled = false;
            btn.innerText = "Guardar Producto";
        });
    </script>
</body>
</html>
