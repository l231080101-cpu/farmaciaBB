<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - FarmaPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
    </style>
</head>
<body class="text-slate-900">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-slate-200 p-6 flex flex-col gap-8">
            <a href="index.html" class="flex items-center gap-2 text-blue-600 font-extrabold text-xl tracking-tighter">
                <span class="bg-blue-600 text-white p-1 rounded-lg">⚕️</span> FarmaPlus
            </a>
            <nav class="flex flex-col gap-2">
                <button class="flex items-center gap-3 p-3 bg-blue-50 text-blue-600 rounded-xl font-bold transition-all">
                    <i data-lucide="layout-grid" size="20"></i> Inventario
                </button>
                <button onclick="location.href='index.html'" class="flex items-center gap-3 p-3 text-slate-500 hover:bg-slate-50 rounded-xl font-bold transition-all">
                    <i data-lucide="home" size="20"></i> Volver al Inicio
                </button>
            </nav>
        </aside>

        <main class="flex-1 p-10">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-4xl font-black text-slate-900 tracking-tight">Panel de Control</h1>
                    <p class="text-slate-500 font-medium">Gestiona productos, categorías y usuarios.</p>
                </div>
                <div class="flex items-center gap-4">
                    <div id="admin-info" class="text-right hidden md:block">
                        <p id="admin-name" class="font-bold text-slate-800">Admin</p>
                        <p class="text-xs text-blue-600 font-bold uppercase">Acceso Total</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600">
                        <i data-lucide="shield-check"></i>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <section class="lg:col-span-2">
                    <div class="glass-card p-8 rounded-[32px] shadow-xl shadow-slate-200/50 mb-8">
                        <h2 class="text-2xl font-black mb-6 flex items-center gap-2">
                            <i data-lucide="plus-circle" class="text-blue-600"></i> Nuevo Producto
                        </h2>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-bold text-slate-600 ml-1">Nombre del Medicamento</label>
                                <input type="text" id="prod-nombre" class="p-4 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 bg-white transition-all" placeholder="Ej. Paracetamol 500mg">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-bold text-slate-600 ml-1">Precio Unitario ($)</label>
                                <input type="number" id="prod-precio" class="p-4 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 bg-white transition-all" placeholder="0.00">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-bold text-slate-600 ml-1">Clasificación / Categoría</label>
                                <select id="prod-categoria" class="p-4 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 bg-white transition-all cursor-pointer font-semibold">
                                    <option value="medicamentos">💊 Medicamento General</option>
                                    <option value="promos">🔥 Promoción / Oferta</option>
                                    <option value="receta">📋 Requiere Receta</option>
                                </select>
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-bold text-slate-600 ml-1">URL de la Imagen</label>
                                <input type="text" id="prod-imagen" class="p-4 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 bg-white transition-all" placeholder="https://ejemplo.com/foto.jpg">
                            </div>
                        </div>

                        <button onclick="guardarProducto()" class="mt-8 w-full bg-blue-600 text-white p-5 rounded-2xl font-bold text-lg hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-[0.98]">
                            Publicar Producto en Catálogo
                        </button>
                    </div>

                    <div class="glass-card p-8 rounded-[32px] shadow-xl shadow-slate-200/50">
                        <h2 class="text-2xl font-black mb-6">Inventario Actual</h2>
                        <div id="lista-inventario" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            </div>
                    </div>
                </section>

                <section>
                    <div class="glass-card p-8 rounded-[32px] shadow-xl shadow-slate-200/50 sticky top-24">
                        <h2 class="text-2xl font-black mb-6 flex items-center gap-2">
                            <i data-lucide="users" class="text-blue-600"></i> Usuarios Registrados
                        </h2>
                        <div id="usuarios-lista" class="flex flex-col gap-4">
                            <p class="text-slate-400 text-sm animate-pulse">Cargando perfiles...</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4'; 
        const sb = supabase.createClient(_url, _key);

        async function init() {
            lucide.createIcons();
            await cargarInventario();
            await cargarUsuarios();
            await checkAdmin();
        }

        async function checkAdmin() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
            if (profile) {
                document.getElementById('admin-name').innerText = profile.full_name;
            }
        }

        async function guardarProducto() {
            const nombre = document.getElementById('prod-nombre').value;
            const precio = document.getElementById('prod-precio').value;
            const categoria = document.getElementById('prod-categoria').value;
            const imagen_url = document.getElementById('prod-imagen').value;

            if(!nombre || !precio || !imagen_url) {
                alert("Por favor completa todos los campos");
                return;
            }

            const { error } = await sb.from('productos').insert([{ 
                nombre, 
                precio: parseFloat(precio), 
                categoria, 
                imagen_url 
            }]);

            if (error) {
                console.error(error);
                alert("Error al guardar: " + error.message);
            } else {
                alert("Producto añadido con éxito!");
                location.reload();
            }
        }

        async function cargarInventario() {
            const { data: productos } = await sb.from('productos').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('lista-inventario');
            
            container.innerHTML = productos.map(p => `
                <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <img src="${p.imagen_url}" class="w-12 h-12 rounded-lg object-cover bg-white border">
                    <div class="flex-1">
                        <p class="font-bold text-slate-800 capitalize text-sm">${p.nombre}</p>
                        <p class="text-xs text-blue-600 font-bold">$${p.precio} • ${p.categoria}</p>
                    </div>
                    <button onclick="eliminarProducto('${p.id}')" class="p-2 text-red-400 hover:text-red-600 transition-colors">
                        <i data-lucide="trash-2" size="18"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function eliminarProducto(id) {
            if(confirm("¿Seguro que quieres eliminar este producto?")) {
                const { error } = await sb.from('productos').delete().eq('id', id);
                if (error) alert("No se pudo eliminar");
                else cargarInventario();
            }
        }

        async function cargarUsuarios() {
            // Nota: Para ver todos los usuarios, asegúrate que en Supabase la tabla 'profiles'
            // tenga deshabilitado el RLS o una política de lectura pública para admins.
            const { data: usuarios, error } = await sb.from('profiles').select('*');

            const container = document.getElementById('usuarios-lista');
            if (error) {
                container.innerHTML = `<p class="text-red-400 text-xs font-bold">Error de permisos RLS en Supabase</p>`;
                return;
            }

            container.innerHTML = usuarios.map(u => `
                <div class="flex items-center gap-3 p-4 bg-white rounded-2xl border border-slate-100 hover:border-blue-200 transition-all">
                    <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 font-bold">
                        ${u.full_name ? u.full_name[0].toUpperCase() : '?'}
                    </div>
                    <div>
                        <p class="font-bold text-slate-800 text-sm leading-none">${u.full_name || 'Sin nombre'}</p>
                        <p class="text-[10px] text-slate-400 mt-1">${u.role || 'usuario'}</p>
                    </div>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
