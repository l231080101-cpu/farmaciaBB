<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - FarmaPlus</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 3px solid #2563eb; color: #2563eb; }
        .loader { border-top-color: #2563eb; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center gap-2 font-bold text-blue-600 text-xl">
                <i data-lucide="shield-check"></i> FarmaPlus Admin
            </div>
            <a href="index.html" class="text-slate-500 hover:text-slate-800 flex items-center gap-1 text-sm">
                <i data-lucide="external-link" size="16"></i> Ver Sitio
            </a>
        </div>
        <div class="max-w-7xl mx-auto px-4 flex gap-8">
            <button onclick="switchTab('usuarios')" class="tab-btn active py-4 font-semibold transition" id="btn-usuarios">Usuarios</button>
            <button onclick="switchTab('productos')" class="tab-btn py-4 font-semibold transition" id="btn-productos">Productos</button>
            <button onclick="switchTab('buzon')" class="tab-btn py-4 font-semibold transition" id="btn-buzon">Buzón de Contacto</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <section id="tab-usuarios" class="tab-content active">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Gestión de Usuarios</h2>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 font-bold">Nombre</th>
                            <th class="p-4 font-bold">Rol Actual</th>
                            <th class="p-4 font-bold text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-usuarios">
                        <tr><td colspan="3" class="p-10 text-center text-slate-400">Cargando usuarios...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section id="tab-productos" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Inventario de Productos</h2>
                <button onclick="openProductModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-blue-700">
                    <i data-lucide="plus" size="18"></i> Nuevo Producto
                </button>
            </div>
            <div id="grid-productos-admin" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <p class="text-slate-400">Cargando inventario...</p>
            </div>
        </section>

        <section id="tab-buzon" class="tab-content">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Buzón de Contacto</h2>
            <div id="lista-mensajes" class="space-y-4">
                <p class="text-slate-400">Cargando mensajes...</p>
            </div>
        </section>

    </main>

    <div id="modal-producto" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold mb-4">Agregar Producto</h3>
            <form id="form-producto" class="space-y-4">
                <input type="hidden" id="edit-id">
                <input type="text" id="p-nombre" placeholder="Nombre del producto" class="w-full p-2 border rounded-lg outline-none focus:border-blue-500" required>
                <input type="number" step="0.01" id="p-precio" placeholder="Precio" class="w-full p-2 border rounded-lg outline-none focus:border-blue-500" required>
                <textarea id="p-desc" placeholder="Descripción" class="w-full p-2 border rounded-lg outline-none focus:border-blue-500"></textarea>
                <input type="url" id="p-img" placeholder="URL de la imagen" class="w-full p-2 border rounded-lg outline-none focus:border-blue-500">
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeProductModal()" class="flex-1 bg-slate-100 py-2 rounded-lg font-semibold text-slate-600">Cancelar</button>
                    <button type="submit" id="btn-save-prod" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        // USA TU LLAVE REAL AQUÍ:
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4';
        const sb = supabase.createClient(_url, _key);

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            
            if(tabId === 'usuarios') loadUsers();
            if(tabId === 'productos') loadProducts();
            if(tabId === 'buzon') loadMessages();
        }

        async function loadUsers() {
            const { data: users, error } = await sb.from('profiles').select('*');
            if(error) return console.error(error);
            const container = document.getElementById('lista-usuarios');
            container.innerHTML = users.map(u => `
                <tr class="border-b border-slate-100">
                    <td class="p-4 font-medium">${u.full_name || 'Sin nombre'}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs font-bold ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">${(u.role || 'usuario').toUpperCase()}</span></td>
                    <td class="p-4 text-right flex justify-end gap-2">
                        <button onclick="changeRole('${u.id}', '${u.role}')" class="text-blue-600 text-xs font-bold">Cambiar Rol</button>
                        <button onclick="deleteUser('${u.id}')" class="text-red-400"><i data-lucide="trash-2" size="18"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        async function loadProducts() {
            const { data: prods, error } = await sb.from('productos').select('*').order('created_at', {ascending: false});
            if(error) return console.error(error);
            const container = document.getElementById('grid-productos-admin');
            container.innerHTML = prods.map(p => `
                <div class="bg-white p-4 rounded-xl border border-slate-200 flex items-center gap-4">
                    <img src="${p.imagen_url || 'https://via.placeholder.com/150'}" class="w-16 h-16 object-cover rounded-lg bg-slate-100">
                    <div class="flex-grow">
                        <h4 class="font-bold text-slate-800 text-sm">${p.nombre}</h4>
                        <p class="text-blue-600 font-bold">$${p.precio}</p>
                    </div>
                    <div class="flex flex-col gap-1">
                        <button onclick="editProduct('${p.id}')" class="p-1 text-slate-400 hover:text-blue-600"><i data-lucide="edit-3" size="18"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="p-1 text-slate-400 hover:text-red-600"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        document.getElementById('form-producto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save-prod');
            btn.disabled = true;
            btn.innerText = "Guardando...";

            const id = document.getElementById('edit-id').value;
            const payload = {
                nombre: document.getElementById('p-nombre').value,
                precio: parseFloat(document.getElementById('p-precio').value),
                descripcion: document.getElementById('p-desc').value,
                imagen_url: document.getElementById('p-img').value
            };

            const { error } = id 
                ? await sb.from('productos').update(payload).eq('id', id)
                : await sb.from('productos').insert([payload]);

            if(error) alert("Error: " + error.message);
            
            btn.disabled = false;
            btn.innerText = "Guardar";
            closeProductModal();
            loadProducts();
        });

        async function loadMessages() {
            const { data: msgs, error } = await sb.from('contacto').select('*').order('created_at', { ascending: false });
            if(error) return console.error(error);
            const container = document.getElementById('lista-mensajes');
            
            if(!msgs?.length) {
                container.innerHTML = `<p class="text-center text-slate-400 py-10">No hay mensajes en el buzón.</p>`;
                return;
            }

            container.innerHTML = msgs.map(m => `
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="font-bold text-slate-800">${m.nombre}</span>
                            <span class="text-xs text-blue-500 block">${m.email}</span>
                        </div>
                        <span class="text-[10px] text-slate-400">${new Date(m.created_at).toLocaleDateString()}</span>
                    </div>
                    <p class="text-sm text-slate-600 italic bg-slate-50 p-3 rounded-lg border border-slate-100 mb-3">"${m.mensaje}"</p>
                    <button onclick="window.location.href='mailto:${m.email}'" class="text-xs bg-blue-600 text-white px-3 py-1.5 rounded font-bold">Responder por Email</button>
                </div>
            `).join('');
        }

        // Funciones auxiliares
        function openProductModal() { 
            document.getElementById('form-producto').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('modal-title').innerText = "Agregar Producto";
            document.getElementById('modal-producto').classList.remove('hidden'); 
        }
        function closeProductModal() { document.getElementById('modal-producto').classList.add('hidden'); }
        
        async function deleteProduct(id) {
            if(confirm('¿Eliminar producto?')) {
                await sb.from('productos').delete().eq('id', id);
                loadProducts();
            }
        }

        async function changeRole(id, currentRole) {
            const newRole = currentRole === 'admin' ? 'usuario' : 'admin';
            await sb.from('profiles').update({ role: newRole }).eq('id', id);
            loadUsers();
        }

        window.onload = () => {
            lucide.createIcons();
            loadUsers();
        };
    </script>
</body>
</html>
