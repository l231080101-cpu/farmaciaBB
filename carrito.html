<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - FarmaPlus</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://sdk.mercadopago.com/js/v2"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .cart-grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        @media (max-width: 900px) { .cart-grid { grid-template-columns: 1fr; } }
        
        .summary-card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; position: sticky; top: 100px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; color: #64748b; }
        .summary-total { display: flex; justify-content: space-between; font-weight: 800; font-size: 1.5rem; color: #1e293b; border-top: 1px solid #f1f5f9; pt-4; }
        
        .button-primary { background: #2563eb; color: white; padding: 15px; border-radius: 15px; font-weight: 700; text-align: center; transition: all 0.2s; }
        .button-primary:hover { background: #1d4ed8; transform: translateY(-2px); }
        .button-outline { border: 2px solid #e2e8f0; color: #64748b; padding: 15px; border-radius: 15px; font-weight: 700; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-10">
            <h1 class="text-4xl font-black text-slate-900">Carrito de Compras</h1>
            <p class="text-slate-500 mt-2">Revisa tus productos antes de finalizar la compra</p>
        </div>

        <div class="cart-grid">
            <div id="cart-items-container" class="space-y-4">
                <div class="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300">
                    <p class="text-slate-400">Cargando tu pedido...</p>
                </div>
            </div>

            <div class="order-summary">
                <div class="summary-card">
                    <h3 class="text-xl font-bold mb-6">Resumen del Pedido</h3>
                    
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="cart-subtotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Envío</span>
                        <span id="cart-shipping">$0.00</span>
                    </div>
                    
                    <div class="summary-total mt-4 pt-4 border-t">
                        <span>Total</span>
                        <span id="cart-total" class="text-blue-600">$0.00</span>
                    </div>

                    <div class="mt-8 space-y-3">
                        <button onclick="openPaymentModal()" class="button-primary w-full block">Proceder al Pago</button>
                        <a href="catalogo.html" class="button-outline w-full block">Seguir Comprando</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl relative">
            <button onclick="closePaymentModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                <i data-lucide="x"></i>
            </button>
            
            <h2 class="text-2xl font-black mb-2 text-slate-900">Finalizar Compra</h2>
            <p class="text-slate-500 text-sm mb-8">Selecciona tu método de pago preferido</p>

            <div class="space-y-4">
                <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                    <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Pago con Tarjeta</label>
                    <input type="text" placeholder="Número de Tarjeta" class="w-full p-3 rounded-xl border border-slate-200 mb-3 outline-none focus:border-blue-500 transition">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" placeholder="MM/AA" class="p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
                        <input type="text" placeholder="CVC" class="p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
                    </div>
                </div>
                
                <button onclick="procesarPagoSimple()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-black transition shadow-lg">
                    <i data-lucide="shield-check" size="20"></i> Pagar con Tarjeta
                </button>

                <div class="relative py-4 flex items-center">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="px-3 text-slate-400 text-[10px] font-bold uppercase tracking-widest">O usa Mercado Pago</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                </div>

                <div id="walletCheckout"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4';
        const sb = supabase.createClient(_url, _key);

        // INICIALIZAR MERCADO PAGO
        const mp = new MercadoPago('TU_PUBLIC_KEY_AQUI', { locale: 'es-MX' });

        let cart = JSON.parse(localStorage.getItem('farmaCart')) || [];

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const subtotalEl = document.getElementById('cart-subtotal');
            const shippingEl = document.getElementById('cart-shipping');
            const totalEl = document.getElementById('cart-total');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300">
                        <div class="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                             <i data-lucide="shopping-cart" class="text-slate-300" size="32"></i>
                        </div>
                        <p class="text-slate-500 font-bold text-xl">Tu carrito está vacío</p>
                        <a href="catalogo.html" class="text-blue-600 font-bold hover:underline mt-2 inline-block">Volver al catálogo</a>
                    </div>`;
                subtotalEl.innerText = "$0.00";
                shippingEl.innerText = "$0.00";
                totalEl.innerText = "$0.00";
                return;
            }

            let subtotal = 0;
            container.innerHTML = cart.map((item, index) => {
                const itemTotal = item.precio * item.cantidad;
                subtotal += itemTotal;
                return `
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-6 group transition hover:shadow-md">
                        <img src="${item.imagen_url || 'https://via.placeholder.com/150'}" class="w-24 h-24 object-cover rounded-2xl bg-slate-50">
                        <div class="flex-grow">
                            <h3 class="font-bold text-slate-800 text-lg">${item.nombre}</h3>
                            <p class="text-slate-400 text-sm line-clamp-1 mb-3">${item.descripcion || 'Sin descripción'}</p>
                            <div class="flex items-center gap-6">
                                <div class="flex items-center bg-slate-50 rounded-xl p-1 border border-slate-100">
                                    <button onclick="updateQty(${index}, -1)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-lg transition">-</button>
                                    <span class="w-10 text-center font-bold text-sm">${item.cantidad}</span>
                                    <button onclick="updateQty(${index}, 1)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-lg transition">+</button>
                                </div>
                                <span class="font-black text-blue-600">$${item.precio} c/u</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-slate-900 text-lg mb-2">$${itemTotal.toFixed(2)}</p>
                            <button onclick="removeItem(${index})" class="text-red-400 hover:text-red-600 p-2 rounded-xl hover:bg-red-50 transition">
                                <i data-lucide="trash-2" size="20"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            const shipping = subtotal > 1000 ? 0 : 99; // Envío gratis a partir de $1000
            subtotalEl.innerText = `$${subtotal.toFixed(2)}`;
            shippingEl.innerText = shipping === 0 ? "¡Gratis!" : `$${shipping.toFixed(2)}`;
            totalEl.innerText = `$${(subtotal + shipping).toFixed(2)}`;
            
            lucide.createIcons();
        }

        window.updateQty = (index, change) => {
            cart[index].cantidad += change;
            if (cart[index].cantidad < 1) cart[index].cantidad = 1;
            save();
        };

        window.removeItem = (index) => {
            if(confirm('¿Eliminar producto del pedido?')) {
                cart.splice(index, 1);
                save();
            }
        };

        function save() {
            localStorage.setItem('farmaCart', JSON.stringify(cart));
            renderCart();
        }

        // CONTROL DE MODAL Y PAGOS
        function openPaymentModal() {
            if(cart.length === 0) return alert("Agrega productos primero.");
            document.getElementById('payment-modal').classList.remove('hidden');
            initMercadoPago();
        }

        function closePaymentModal() {
            document.getElementById('payment-modal').classList.add('hidden');
        }

        async function procesarPagoSimple() {
            // Aquí podrías guardar el pedido en Supabase antes de limpiar
            alert("¡Gracias por tu compra! Tu pedido está en camino.");
            localStorage.removeItem('farmaCart');
            window.location.href = 'index.html';
        }

        async function initMercadoPago() {
            // Nota: El botón de Mercado Pago requiere un preferenceId generado por un servidor
            // Este es el contenedor donde aparecerá el botón oficial
            console.log("Iniciando Bricks de Mercado Pago...");
        }

        window.onload = () => {
            renderCart();
            lucide.createIcons();
        };
    </script>
</body>
</html>
