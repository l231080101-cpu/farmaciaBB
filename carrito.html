<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pedido - FarmaPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card-style { background: white; border-radius: 32px; border: 1px solid #f1f5f9; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .cart-grid { display: grid; grid-template-columns: 1fr 380px; gap: 24px; }
        @media (max-width: 1024px) { .cart-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="antialiased text-slate-900">

    <header class="max-w-6xl mx-auto px-6 py-6 flex justify-between items-center">
        <a href="catalogo.html" class="flex items-center gap-2 text-blue-600 font-extrabold text-2xl tracking-tighter">
            <span class="bg-blue-600 text-white p-1 rounded-lg">⚕️</span> FarmaPlus
        </a>
        <div id="user-profile" class="flex items-center gap-3 bg-white p-2 pr-5 rounded-2xl border border-slate-100 shadow-sm">
            <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600"><i data-lucide="user"></i></div>
            <div>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Sesión</p>
                <p id="user-email" class="text-sm font-bold text-slate-700">Invitado</p>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <div class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight">Tu Carrito</h1>
                <p class="text-slate-500">Revisa tus productos antes de finalizar.</p>
            </div>
            <a href="catalogo.html" class="text-blue-600 font-bold flex items-center gap-2 hover:underline">
                <i data-lucide="arrow-left" size="18"></i> Volver al catálogo
            </a>
        </div>

        <div class="cart-grid">
            <div id="cart-items-container" class="space-y-4"></div>

            <aside id="summary-sidebar" class="hidden">
                <div class="card-style p-8 sticky top-6">
                    <h3 class="text-xl font-bold mb-6">Resumen</h3>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-slate-500"><span>Subtotal</span><span id="subtotal" class="font-bold text-slate-800">$0.00</span></div>
                        <div class="flex justify-between text-slate-500"><span>Envío</span><span class="font-bold text-green-600 italic">Gratis</span></div>
                        <div class="border-t pt-4 flex justify-between items-center"><span class="font-bold text-lg">Total</span><span id="total" class="text-3xl font-black text-blue-600">$0.00</span></div>
                    </div>

                    <div class="space-y-3">
                        <button onclick="procesarPedido('Mercado Pago')" class="w-full bg-[#009EE3] text-white py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-3 hover:brightness-95 transition-all shadow-lg shadow-blue-100">
                            Pagar con Mercado Pago
                        </button>
                        <button onclick="procesarPedido('Efectivo')" class="w-full border-2 border-slate-100 text-slate-600 py-3 rounded-2xl font-bold hover:bg-slate-50 transition-all">
                            Pagar en Efectivo
                        </button>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4'; 
        const sb = supabase.createClient(_url, _key);

        let cart = JSON.parse(localStorage.getItem('farmaCart')) || [];

        async function cargarUsuario() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) document.getElementById('user-email').innerText = user.email;
        }

        function render() {
            const container = document.getElementById('cart-items-container');
            const sidebar = document.getElementById('summary-sidebar');
            const grid = document.querySelector('.cart-grid');

            if (cart.length === 0) {
                sidebar.classList.add('hidden');
                grid.style.display = "block";
                container.innerHTML = `
                    <div class="card-style py-20 text-center max-w-2xl mx-auto border-2 border-dashed">
                        <i data-lucide="shopping-basket" class="text-blue-600 mx-auto mb-6" size="48"></i>
                        <h2 class="text-2xl font-black mb-6">Tu carrito está vacío</h2>
                        <a href="catalogo.html" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg inline-block">Ver Productos</a>
                    </div>`;
                lucide.createIcons();
                return;
            }

            sidebar.classList.remove('hidden');
            grid.style.display = "grid";
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.precio * item.cantidad;
                return `
                    <div class="card-style p-6 flex items-center gap-6">
                        <img src="${item.imagen_url}" class="w-20 h-20 object-cover rounded-2xl bg-slate-50">
                        <div class="flex-grow">
                            <h4 class="font-black text-lg">${item.nombre}</h4>
                            <div class="flex items-center gap-4">
                                <span class="text-blue-600 font-bold">$${item.precio}</span>
                                <div class="flex items-center bg-slate-100 rounded-lg p-1">
                                    <button onclick="changeQty(${index}, -1)" class="px-2 font-bold">-</button>
                                    <span class="px-2 text-sm font-bold">${item.cantidad}</span>
                                    <button onclick="changeQty(${index}, 1)" class="px-2 font-bold">+</button>
                                </div>
                            </div>
                        </div>
                        <button onclick="remove(${index})" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2"></i></button>
                    </div>`;
            }).join('');
            document.getElementById('total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('subtotal').innerText = `$${total.toFixed(2)}`;
            lucide.createIcons();
        }

        async function procesarPedido(metodo) {
            const total = cart.reduce((acc, i) => acc + (i.precio * i.cantidad), 0);
            const userEmail = document.getElementById('user-email').innerText;

            const { error } = await sb.from('pedidos').insert({
                usuario_email: userEmail,
                items: cart,
                total: total,
                metodo_pago: metodo
            });

            if (error) {
                alert("Error al guardar el pedido");
            } else {
                alert("¡Pedido registrado con éxito via " + metodo + "!");
                localStorage.removeItem('farmaCart');
                window.location.href = "catalogo.html";
            }
        }

        window.changeQty = (idx, d) => { cart[idx].cantidad += d; if(cart[idx].cantidad < 1) cart[idx].cantidad = 1; save(); };
        window.remove = (idx) => { cart.splice(idx, 1); save(); };
        function save() { localStorage.setItem('farmaCart', JSON.stringify(cart)); render(); }
        
        window.onload = () => { cargarUsuario(); render(); lucide.createIcons(); };
    </script>
</body>
</html>
