<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pedido - FarmaPlus</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card-style { 
            background: white; 
            border-radius: 32px; 
            border: 1px solid #f1f5f9;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); 
        }
        .cart-grid { display: grid; grid-template-columns: 1fr 350px; gap: 24px; }
        @media (max-width: 1024px) { .cart-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="antialiased text-slate-900">

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight">Tu Carrito</h1>
                <p class="text-slate-500">Gestiona tus productos y finaliza tu compra de forma segura.</p>
            </div>
            <a href="catalogo.html" class="text-blue-600 font-bold flex items-center gap-2 hover:underline">
                <i data-lucide="arrow-left" size="18"></i> Volver al catálogo
            </a>
        </div>

        <div class="cart-grid">
            <div id="cart-items-container" class="space-y-4">
                </div>

            <aside id="summary-sidebar" class="hidden">
                <div class="card-style p-6 sticky top-6">
                    <h3 class="text-xl font-bold mb-6">Resumen</h3>
                    <div class="space-y-3 mb-6">
                        <div class="flex justify-between text-slate-500 text-sm">
                            <span>Subtotal</span>
                            <span id="subtotal" class="font-bold text-slate-800">$0.00</span>
                        </div>
                        <div class="flex justify-between text-slate-500 text-sm">
                            <span>Envío</span>
                            <span id="shipping" class="font-bold text-green-600">Gratis</span>
                        </div>
                        <div class="border-t pt-4 flex justify-between items-center">
                            <span class="font-bold">Total</span>
                            <span id="total" class="text-3xl font-black text-blue-600">$0.00</span>
                        </div>
                    </div>
                    <button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all mb-3">
                        Pagar Ahora
                    </button>
                    <a href="catalogo.html" class="w-full block text-center border-2 border-slate-100 text-slate-500 py-3 rounded-2xl font-bold hover:bg-slate-50 transition-all">
                        Seguir comprando
                    </a>
                </div>
            </aside>
        </div>
    </main>

    <script>
        let cart = JSON.parse(localStorage.getItem('farmaCart')) || [];

        function render() {
            const container = document.getElementById('cart-items-container');
            const sidebar = document.getElementById('summary-sidebar');
            const grid = document.querySelector('.cart-grid');

            if (cart.length === 0) {
                sidebar.classList.add('hidden');
                grid.style.display = "block";

                container.innerHTML = `
                    <div class="card-style py-16 px-6 flex flex-col items-center text-center max-w-3xl mx-auto">
                        <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-6">
                            <i data-lucide="shopping-basket" class="text-blue-600" size="40"></i>
                        </div>
                        <h2 class="text-3xl font-black text-slate-900 mb-3">Tu carrito está vacío</h2>
                        <p class="text-slate-500 mb-8 max-w-sm mx-auto">
                            Parece que aún no has añadido ninguna medicina o producto a tu pedido.
                        </p>
                        <a href="./catalogo.html" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-100 hover:bg-blue-700 hover:-translate-y-1 transition-all flex items-center gap-2">
                            <i data-lucide="plus-circle" size="20"></i> Ir al Catálogo
                        </a>
                    </div>`;
                lucide.createIcons();
                return;
            }

            sidebar.classList.remove('hidden');
            grid.style.display = "grid";
            
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.precio * item.cantidad;
                return `
                    <div class="card-style p-5 flex items-center gap-5 transition-all hover:border-blue-100">
                        <img src="${item.imagen_url}" class="w-20 h-20 object-cover rounded-2xl bg-slate-50" onerror="this.src='https://via.placeholder.com/150'">
                        <div class="flex-grow">
                            <h4 class="font-bold text-lg text-slate-900">${item.nombre}</h4>
                            <div class="flex items-center gap-4 mt-1">
                                <span class="text-blue-600 font-black">$${item.precio}</span>
                                <div class="flex items-center bg-slate-50 rounded-xl px-2 py-1 border border-slate-100">
                                    <button onclick="changeQty(${index}, -1)" class="w-6 font-bold hover:text-blue-600 transition-colors">-</button>
                                    <span class="w-8 text-center text-xs font-bold">${item.cantidad}</span>
                                    <button onclick="changeQty(${index}, 1)" class="w-6 font-bold hover:text-blue-600 transition-colors">+</button>
                                </div>
                            </div>
                        </div>
                        <button onclick="remove(${index})" class="text-slate-300 hover:text-red-500 transition-colors p-2">
                            <i data-lucide="trash-2" size="20"></i>
                        </button>
                    </div>
                `;
            }).join('');

            document.getElementById('subtotal').innerText = `$${total.toFixed(2)}`;
            document.getElementById('total').innerText = `$${total.toFixed(2)}`;
            lucide.createIcons();
        }

        window.changeQty = (idx, delta) => {
            cart[idx].cantidad += delta;
            if (cart[idx].cantidad < 1) cart[idx].cantidad = 1;
            save();
        };

        window.remove = (idx) => {
            if(confirm('¿Deseas eliminar este producto?')) {
                cart.splice(idx, 1);
                save();
            }
        };

        function save() {
            localStorage.setItem('farmaCart', JSON.stringify(cart));
            render();
        }

        window.onload = () => {
            render();
            lucide.createIcons();
        };
    </script>
</body>
</html>
