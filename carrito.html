<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pedido - FarmaPlus</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .cart-grid { display: grid; grid-template-columns: 1fr 380px; gap: 32px; }
        @media (max-width: 1024px) { .cart-grid { grid-template-columns: 1fr; } }
        
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .empty-state-bounce { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="antialiased text-slate-900">

    <main class="max-w-7xl mx-auto px-6 py-16">
        <div class="flex flex-col mb-12">
            <h1 class="text-5xl font-extrabold tracking-tight mb-3">Tu Carrito</h1>
            <p class="text-slate-500 text-lg">Gestiona tus productos y finaliza tu compra de forma segura.</p>
        </div>

        <div class="cart-grid">
            <div id="cart-items-container" class="space-y-6">
                </div>

            <aside id="order-summary-aside" class="relative">
                <div class="bg-white p-8 rounded-[32px] border border-slate-100 card-shadow sticky top-10">
                    <h3 class="text-2xl font-bold mb-8">Resumen de compra</h3>
                    
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-slate-500 font-medium">
                            <span>Subtotal</span>
                            <span id="cart-subtotal" class="text-slate-900 font-bold">$0.00</span>
                        </div>
                        <div class="flex justify-between text-slate-500 font-medium">
                            <span>Envío</span>
                            <span id="cart-shipping" class="text-green-600 font-bold">$0.00</span>
                        </div>
                        <div class="border-t border-slate-100 pt-6 flex justify-between items-end">
                            <span class="text-slate-900 font-bold">Total a pagar</span>
                            <span id="cart-total" class="text-4xl font-black text-blue-600">$0.00</span>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <button onclick="openPaymentModal()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-extrabold text-lg shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95 flex items-center justify-center gap-3">
                            <i data-lucide="credit-card"></i> Pagar Ahora
                        </button>
                        <a href="catalogo.html" class="w-full border-2 border-slate-100 text-slate-500 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-slate-50 transition-all">
                            <i data-lucide="arrow-left" size="18"></i> Seguir comprando
                        </a>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <div id="payment-modal" class="fixed inset-0 bg-slate-900/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-[40px] p-10 w-full max-w-md shadow-2xl relative">
            <button onclick="closePaymentModal()" class="absolute top-6 right-6 p-2 hover:bg-slate-100 rounded-full transition">
                <i data-lucide="x" class="text-slate-400"></i>
            </button>
            
            <h2 class="text-3xl font-black mb-2">Finalizar Pago</h2>
            <p class="text-slate-500 mb-8">Selecciona el método de tu preferencia.</p>

            <div class="space-y-5">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-2xl text-white shadow-lg mb-6">
                    <div class="flex justify-between mb-10"><i data-lucide="cpu" size="32"></i> <span class="font-black italic text-xl tracking-tighter">FarmaPlus Pay</span></div>
                    <p class="text-xl tracking-[0.2em] mb-4">**** **** **** ****</p>
                    <div class="flex justify-between text-[10px] uppercase font-bold opacity-60"><span>Titular</span><span>Vencimiento</span></div>
                </div>

                <div class="space-y-3">
                    <input type="text" placeholder="Número de Tarjeta" class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:ring-2 ring-blue-100">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" placeholder="MM/AA" class="p-4 rounded-xl border border-slate-200 outline-none">
                        <input type="text" placeholder="CVV" class="p-4 rounded-xl border border-slate-200 outline-none">
                    </div>
                </div>
                
                <button onclick="procesarPago()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-black transition-all">
                    Confirmar Compra
                </button>

                <div class="text-center">
                    <span class="text-xs text-slate-400 font-bold uppercase tracking-widest">O paga con Mercado Pago</span>
                    <div id="walletCheckout" class="mt-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'TU_ANON_KEY_REAL'; // Pon tu llave aquí
        const sb = supabase.createClient(_url, _key);

        let cart = JSON.parse(localStorage.getItem('farmaCart')) || [];

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const summaryAside = document.getElementById('order-summary-aside');
            const subtotalEl = document.getElementById('cart-subtotal');
            const shippingEl = document.getElementById('cart-shipping');
            const totalEl = document.getElementById('cart-total');

            // --- CASO 1: CARRITO VACÍO ---
            if (cart.length === 0) {
                summaryAside.classList.add('hidden'); // Ocultamos el resumen
                container.classList.remove('lg:col-span-1'); // Expandimos el contenedor
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 bg-white rounded-[40px] border-2 border-dashed border-slate-200 text-center px-6 card-shadow">
                        <div class="w-32 h-32 bg-blue-50 rounded-full flex items-center justify-center mb-8 empty-state-bounce">
                             <i data-lucide="shopping-basket" class="text-blue-600" size="48"></i>
                        </div>
                        <h2 class="text-4xl font-black text-slate-900 mb-4">Tu carrito está vacío</h2>
                        <p class="text-slate-500 mb-10 max-w-sm text-lg">Parece que aún no has añadido ninguna medicina o producto a tu pedido. ¡Explora nuestro catálogo!</p>
                        <a href="catalogo.html" class="bg-blue-600 text-white px-12 py-5 rounded-2xl font-black text-xl shadow-2xl shadow-blue-200 hover:bg-blue-700 hover:-translate-y-1 transition-all flex items-center gap-3">
                            <i data-lucide="plus-circle"></i> Ir al Catálogo
                        </a>
                    </div>`;
                lucide.createIcons();
                return;
            }

            // --- CASO 2: CARRITO CON PRODUCTOS ---
            summaryAside.classList.remove('hidden');
            let subtotal = 0;
            
            container.innerHTML = cart.map((item, index) => {
                const sub = item.precio * item.cantidad;
                subtotal += sub;
                return `
                    <div class="bg-white p-8 rounded-[32px] border border-slate-100 card-shadow flex flex-col sm:flex-row items-center gap-8 transition-all hover:border-blue-100">
                        <img src="${item.imagen_url}" class="w-32 h-32 object-cover rounded-[24px] bg-slate-50 border border-slate-50">
                        <div class="flex-grow text-center sm:text-left">
                            <h3 class="font-extrabold text-2xl text-slate-900 mb-1">${item.nombre}</h3>
                            <p class="text-slate-400 text-sm mb-6 line-clamp-1">${item.descripcion || 'Sin descripción'}</p>
                            
                            <div class="flex items-center justify-center sm:justify-start gap-6">
                                <div class="flex items-center bg-slate-50 rounded-2xl p-1.5 border border-slate-100">
                                    <button onclick="updateQty(${index}, -1)" class="w-10 h-10 flex items-center justify-center hover:bg-white rounded-xl transition shadow-sm">-</button>
                                    <span class="w-12 text-center font-black text-lg">${item.cantidad}</span>
                                    <button onclick="updateQty(${index}, 1)" class="w-10 h-10 flex items-center justify-center hover:bg-white rounded-xl transition shadow-sm">+</button>
                                </div>
                                <span class="text-blue-600 font-black text-xl">$${item.precio}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-center sm:items-end gap-4 min-w-[120px]">
                            <span class="text-2xl font-black text-slate-900">$${sub.toFixed(2)}</span>
                            <button onclick="removeItem(${index})" class="text-red-400 hover:text-red-600 p-3 hover:bg-red-50 rounded-2xl transition">
                                <i data-lucide="trash-2" size="24"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            const shipping = subtotal > 1500 ? 0 : 150; // Envío gratis sobre 1500
            subtotalEl.innerText = `$${subtotal.toFixed(2)}`;
            shippingEl.innerText = shipping === 0 ? "¡Gratis!" : `$${shipping.toFixed(2)}`;
            totalEl.innerText = `$${(subtotal + shipping).toFixed(2)}`;
            
            lucide.createIcons();
        }

        window.updateQty = (index, change) => {
            cart[index].cantidad += change;
            if (cart[index].cantidad < 1) cart[index].cantidad = 1;
            save();
        };

        window.removeItem = (index) => {
            cart.splice(index, 1);
            save();
        };

        function save() {
            localStorage.setItem('farmaCart', JSON.stringify(cart));
            renderCart();
        }

        function openPaymentModal() {
            document.getElementById('payment-modal').classList.remove('hidden');
        }

        function closePaymentModal() {
            document.getElementById('payment-modal').classList.add('hidden');
        }

        function procesarPago() {
            alert("✅ ¡Pedido realizado con éxito! Gracias por confiar en FarmaPlus.");
            localStorage.removeItem('farmaCart');
            window.location.href = 'index.html';
        }

        window.onload = () => {
            renderCart();
            lucide.createIcons();
        };
    </script>
</body>
</html>
