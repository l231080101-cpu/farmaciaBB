<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pedido - FarmaPlus</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=ASEcLzy9M3HCy1i29pwdbZfFqobzlFMtf3zm55Cvz5tcdTLRV-sqkBM4lItOa6I0T19Ydec2cLWz4WLq&currency=MXN&locale=es_MX"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <!-- Archivos externos de accesibilidad (opcionales) -->
    <link rel="stylesheet" href="accesibilidad.css">
    <script src="accesibilidad.js" defer></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; transition: background-color 0.3s, color 0.3s; }
        .card-style { background: white; border-radius: 20px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        /* Ajuste para que el texto sea legible en modo oscuro en el carrito */
        body.dark-mode .card-style { background: #1e293b; border-color: #334155; color: white; }
        body.dark-mode h1, body.dark-mode h3, body.dark-mode h4 { color: white; }
        body.dark-mode .bg-white.border-b { background-color: #1e293b !important; border-color: #334155; }
        
        /* Estilos de accesibilidad (igual que en index y catalog) */
        #acc-toggle-btn {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 56px;
            height: 56px;
            background-color: #2563eb;
            color: white;
            border-radius: 50%;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s;
            border: none;
        }
        #acc-toggle-btn:hover { transform: scale(1.1); }
        #accessibility-panel {
            position: fixed;
            bottom: 96px;
            left: 24px;
            background: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 16px;
            width: 260px;
            z-index: 99;
            display: none;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }
        #accessibility-panel.active { display: block; }
        .reading-guide {
            display: none;
            position: fixed;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: yellow;
            pointer-events: none;
            z-index: 9999;
        }
        .reading-guide.active { display: block; }
        .dark-mode { background-color: #1e293b !important; color: #f1f5f9; }
        .high-contrast { background-color: black !important; color: yellow !important; }
        .high-contrast a, .high-contrast button {
            background-color: yellow !important; color: black !important; border: 2px solid white;
        }
        /* Botón de seguir comprando */
        .btn-seguir-comprando {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #f1f5f9;
            color: #1e293b;
            padding: 10px 20px;
            border-radius: 9999px;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 12px;
        }
        .btn-seguir-comprando:hover {
            background-color: #e2e8f0;
            transform: translateX(-3px);
        }
        .dark-mode .btn-seguir-comprando {
            background-color: #334155;
            color: #f1f5f9;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Componentes de accesibilidad (bloque mejorado) -->
    <div id="reading-line" class="reading-guide"></div>

    <div id="acc-toggle-btn" onclick="toggleAccPanel()" title="Menú de Accesibilidad">
        <i data-lucide="accessibility"></i>
    </div>

    <div id="accessibility-panel">
        <h3 class="text-lg font-bold mb-4 border-b border-slate-700 pb-2 text-white">Accesibilidad</h3>
        <div class="flex flex-col gap-4 text-sm text-white">
            <label class="flex justify-between items-center cursor-pointer">
                Modo Oscuro
                <input type="checkbox" id="dark-mode-checkbox" onchange="toggleDarkMode(this.checked)">
            </label>
            <div class="flex flex-col gap-1">
                <span>Tamaño de letra: <b id="text-size-val">100%</b></span>
                <input type="range" id="text-size-slider" min="80" max="150" value="100" class="w-full" oninput="changeTextSize(this.value)">
            </div>
            <label class="flex justify-between items-center cursor-pointer">
                Contraste Alto
                <input type="checkbox" id="high-contrast-checkbox" onchange="toggleHighContrast(this.checked)">
            </label>
            <label class="flex justify-between items-center cursor-pointer">
                Guía de Lectura
                <input type="checkbox" id="reading-guide-checkbox" onchange="toggleReadingGuide(this.checked)">
            </label>
            <label class="flex justify-between items-center cursor-pointer">
                Narrador de Voz
                <input type="checkbox" id="narrator-checkbox" onchange="toggleNarrator(this.checked)">
            </label>
        </div>
    </div>

    <header class="bg-white border-b border-slate-100 mb-8">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-xl text-xl">⚕️</div>
                <div>
                    <h1 class="text-xl font-extrabold text-blue-600 leading-none">FarmaPlus</h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-tighter">Tu farmacia de confianza</p>
                </div>
            </a>
            <div id="user-info" class="flex items-center gap-3 bg-slate-50 p-2 pr-5 rounded-2xl border border-slate-100 hidden">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-blue-600 shadow-sm"><i data-lucide="shield-check" size="18"></i></div>
                <p id="user-email" class="text-xs font-bold text-slate-700 italic">Verificando sesión...</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 mb-20">
        <div class="mb-8">
            <h1 class="text-4xl font-black text-slate-900 mt-4 tracking-tight">Tu Carrito Seguro</h1>
            <!-- Botón para regresar al catálogo -->
            <a href="catalog.html" class="btn-seguir-comprando" aria-label="Seguir comprando, regresar al catálogo">
                <i data-lucide="arrow-left" size="18" aria-hidden="true"></i>
                Seguir comprando
            </a>
        </div>

        <div id="cart-grid" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div id="cart-items-container" class="lg:col-span-2 space-y-4"></div>

            <aside id="summary-sidebar" class="hidden">
                <div class="card-style p-8 sticky top-6">
                    <h3 class="text-xl font-bold mb-6">Resumen de Compra</h3>
                    <div class="space-y-4 border-t pt-6 mb-8">
                        <div class="flex justify-between text-slate-500 font-bold"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
                        <div class="flex justify-between items-center"><span class="font-black text-xl text-slate-900">Total</span><span id="total" class="text-3xl font-black text-blue-600">$0.00</span></div>
                    </div>
                    <div id="recaptcha-container" class="flex justify-center mb-4">
                        <div class="g-recaptcha" data-sitekey="6LeQ9bosAAAAAGtnWuHoV38cKpEC4_i6oRD0Yhjg" data-callback="habilitarPaypal"></div>
                    </div>
                    <div id="paypal-button-container" style="display: none;"></div>
                    <p class="text-center text-[10px] text-slate-400 mt-4 italic flex items-center justify-center gap-1">
                        <i data-lucide="lock" size="10"></i> Pago seguro y encriptado por PayPal Inc.
                    </p>
                </div>
            </aside>
        </div>
    </main>

    <script>
        // ==================== CONFIGURACIÓN SUPABASE ====================
        const supabaseUrl = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4';
        const dbClient = supabase.createClient(supabaseUrl, supabaseKey);

        // ==================== VARIABLES GLOBALES ====================
        let cart = JSON.parse(localStorage.getItem('farmaCart')) || [];
        let currentUser = null;

        // ==================== ACCESIBILIDAD (funciones completas con persistencia) ====================
        function toggleAccPanel() {
            const panel = document.getElementById('accessibility-panel');
            if (panel) panel.classList.toggle('active');
        }

        function changeTextSize(val) {
            let size = Math.min(150, Math.max(80, Number(val)));
            document.documentElement.style.fontSize = size + "%";
            const label = document.getElementById('text-size-val');
            if (label) label.innerText = size + "%";
            localStorage.setItem('textSize', size);
            const slider = document.getElementById('text-size-slider');
            if (slider) slider.value = size;
        }

        let guideHandler = null;
        function toggleReadingGuide(active) {
            const line = document.getElementById('reading-line');
            if (!line) return;
            if (active) {
                line.classList.add('active');
                if (guideHandler) window.removeEventListener('mousemove', guideHandler);
                guideHandler = (e) => { line.style.top = e.clientY + 'px'; };
                window.addEventListener('mousemove', guideHandler);
            } else {
                line.classList.remove('active');
                if (guideHandler) window.removeEventListener('mousemove', guideHandler);
                guideHandler = null;
            }
            localStorage.setItem('readingGuide', active);
            const chk = document.getElementById('reading-guide-checkbox');
            if (chk && chk.checked !== active) chk.checked = active;
        }

        let narratorActive = false;
        function speakText(e) {
            if (!narratorActive) return;
            let target = e.target;
            let text = target.getAttribute('aria-label') || target.innerText;
            if (text && typeof text === 'string' && text.trim().length > 0 && text.trim().length < 200) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text.trim());
                utterance.lang = 'es-MX';
                window.speechSynthesis.speak(utterance);
            }
        }

        function toggleNarrator(active) {
            narratorActive = active;
            if (active) {
                document.body.addEventListener('click', speakText);
                const msg = new SpeechSynthesisUtterance('Narrador activado. Haga clic en cualquier texto para leerlo.');
                msg.lang = 'es-MX';
                window.speechSynthesis.speak(msg);
            } else {
                document.body.removeEventListener('click', speakText);
                window.speechSynthesis.cancel();
            }
            localStorage.setItem('narrator', active);
            const chk = document.getElementById('narrator-checkbox');
            if (chk && chk.checked !== active) chk.checked = active;
        }

        function toggleDarkMode(active) {
            document.body.classList.toggle('dark-mode', active);
            localStorage.setItem('darkMode', active);
        }

        function toggleHighContrast(active) {
            document.body.classList.toggle('high-contrast', active);
            localStorage.setItem('highContrast', active);
        }

        function restoreAccessibilityPrefs() {
            const savedSize = localStorage.getItem('textSize');
            if (savedSize) changeTextSize(parseInt(savedSize));
            if (localStorage.getItem('darkMode') === 'true') toggleDarkMode(true);
            if (localStorage.getItem('highContrast') === 'true') toggleHighContrast(true);
            if (localStorage.getItem('readingGuide') === 'true') {
                toggleReadingGuide(true);
                const chk = document.getElementById('reading-guide-checkbox');
                if (chk) chk.checked = true;
            }
            if (localStorage.getItem('narrator') === 'true') {
                toggleNarrator(true);
                const chk = document.getElementById('narrator-checkbox');
                if (chk) chk.checked = true;
            }
        }

        // ==================== FUNCIONES DEL CARRITO ====================
        async function checkSession() {
            const { data: { session }, error } = await dbClient.auth.getSession();
            if (error || !session) {
                window.location.href = 'login.html';
                return null;
            }
            return session.user;
        }

        async function init() {
            restoreAccessibilityPrefs(); // Restaurar preferencias de accesibilidad
            lucide.createIcons();
            currentUser = await checkSession();
            if (!currentUser) return;
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('user-email').innerText = currentUser.email;
            render();
            // Sincronizar checkboxes con el estado actual del body (por si se restauraron clases)
            if (document.body.classList.contains('dark-mode')) {
                const chk = document.getElementById('dark-mode-checkbox');
                if (chk) chk.checked = true;
            }
            if (document.body.classList.contains('high-contrast')) {
                const chk = document.getElementById('high-contrast-checkbox');
                if (chk) chk.checked = true;
            }
        }

        function render() {
            const container = document.getElementById('cart-items-container');
            const sidebar = document.getElementById('summary-sidebar');

            if (cart.length === 0) {
                sidebar.classList.add('hidden');
                container.innerHTML = `<div class="card-style py-20 text-center text-slate-500 font-bold"><h2>Tu carrito está vacío</h2></div>`;
            } else {
                sidebar.classList.remove('hidden');
                let total = cart.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);
                
                container.innerHTML = cart.map((item, idx) => {
                    const safeName = DOMPurify.sanitize(item.nombre);
                    const safeImg = DOMPurify.sanitize(item.imagen_url);
                    return `
                    <div class="card-style p-5 flex items-center gap-6">
                        <img src="${safeImg}" class="w-20 h-20 object-contain" alt="Producto">
                        <div class="flex-grow">
                            <h4 class="font-bold text-slate-800">${safeName}</h4>
                            <p class="text-blue-600 font-black text-lg">$${item.precio}</p>
                        </div>
                        <div class="flex items-center gap-3 bg-slate-50 p-2 rounded-xl">
                            <button onclick="changeQty(${idx}, -1)" class="w-8 h-8 bg-white shadow-sm border border-slate-100 rounded-lg text-slate-900">-</button>
                            <span class="font-bold w-4 text-center text-slate-900">${item.cantidad}</span>
                            <button onclick="changeQty(${idx}, 1)" class="w-8 h-8 bg-white shadow-sm border border-slate-100 rounded-lg text-slate-900">+</button>
                        </div>
                    </div>`;
                }).join('');

                document.getElementById('total').innerText = `$${total.toFixed(2)}`;
                document.getElementById('subtotal').innerText = `$${total.toFixed(2)}`;
            }
            // Volver a inicializar iconos por si el DOM cambió
            lucide.createIcons();
        }

        window.habilitarPaypal = function() {
            document.getElementById('recaptcha-container').style.display = 'none';
            document.getElementById('paypal-button-container').style.display = 'block';
            initPayPal();
        };

        function initPayPal() {
            const totalCompra = cart.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);
            const paypalContainer = document.getElementById('paypal-button-container');
            if (!paypalContainer) return;
            paypalContainer.innerHTML = ''; // Limpiar por si se reinicia
            paypal.Buttons({
                style: { layout: 'vertical', color: 'blue', shape: 'pill', label: 'pay', height: 45 },
                createOrder: (data, actions) => {
                    return actions.order.create({
                        purchase_units: [{ 
                            description: "Compra segura en FarmaPlus",
                            amount: { currency_code: 'MXN', value: totalCompra.toFixed(2).toString() }
                        }]
                    });
                },
                onApprove: async (data, actions) => {
                    try {
                        const details = await actions.order.capture();
                        const { error } = await dbClient.from('pedidos').insert([{ 
                            user_id: currentUser.id,
                            productos: cart,      
                            total: totalCompra,
                            paypal_id: details.id, 
                            estado: 'pagado'
                        }]);
                        if (error) throw error;
                        alert("¡Compra exitosa! Pedido registrado.");
                        localStorage.removeItem('farmaCart');
                        window.location.href = "index.html";
                    } catch (err) {
                        console.error("Error:", err);
                        alert("Error al registrar pedido. ID: " + data.orderID);
                    }
                }
            }).render('#paypal-button-container');
        }

        window.changeQty = (idx, d) => {
            cart[idx].cantidad += d;
            if(cart[idx].cantidad < 1) cart.splice(idx, 1);
            localStorage.setItem('farmaCart', JSON.stringify(cart));
            render(); 
            // Si el botón de PayPal ya estaba visible, reiniciarlo para reflejar nuevo total
            const paypalContainer = document.getElementById('paypal-button-container');
            if (paypalContainer && paypalContainer.style.display === 'block') {
                paypalContainer.innerHTML = '';
                initPayPal();
            }
        };

        window.onload = init;
    </script>
    <!-- Referencia a sessionTimeout.js si existe (no causa error si falta) -->
    <script src="js/sessionTimeout.js"></script>
</body>
</html>
