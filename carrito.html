<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pedido - FarmaPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=ASEcLzy9M3HCy1i29pwdbZfFqobzlFMtf3zm55Cvz5tcdTLRV-sqkBM4lItOa6I0T19Ydec2cLWz4WLq&currency=MXN"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card-style { background: white; border-radius: 20px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="antialiased">

    <header class="bg-white border-bottom border-slate-100 mb-8">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-xl text-xl">⚕️</div>
                <div>
                    <h1 class="text-xl font-extrabold text-blue-600 leading-none">FarmaPlus</h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-tighter">Tu farmacia de confianza</p>
                </div>
            </a>
            <div id="user-info" class="flex items-center gap-3 bg-slate-50 p-2 pr-5 rounded-2xl border border-slate-100">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-blue-600 shadow-sm"><i data-lucide="user" size="18"></i></div>
                <p id="user-email" class="text-xs font-bold text-slate-700 italic">Cargando...</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 mb-20">
        <div class="mb-8">
            <h1 class="text-4xl font-black text-slate-900 mt-4 tracking-tight">Tu Carrito</h1>
        </div>

        <div id="cart-grid" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div id="cart-items-container" class="lg:col-span-2 space-y-4"></div>

            <aside id="summary-sidebar" class="hidden">
                <div class="card-style p-8 sticky top-6">
                    <h3 class="text-xl font-bold mb-6">Resumen de Compra</h3>
                    
                    <div class="space-y-4 border-t pt-6 mb-8">
                        <div class="flex justify-between text-slate-500 font-bold"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
                        <div class="flex justify-between items-center"><span class="font-black text-xl text-slate-900">Total</span><span id="total" class="text-3xl font-black text-blue-600">$0.00</span></div>
                    </div>

                    <div id="paypal-button-container"></div>
                    
                    <p class="text-center text-[10px] text-slate-400 mt-4 italic">Pago seguro procesado por PayPal Inc.</p>
                </div>
            </aside>
        </div>
    </main>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4'; 
        const sb = supabase.createClient(_url, _key);

        let cart = JSON.parse(localStorage.getItem('farmaCart')) || [];

        async function init() {
            lucide.createIcons();
            const { data: { user } } = await sb.auth.getUser();
            document.getElementById('user-email').innerText = user ? user.email : "Invitado";
            render();
            if(cart.length > 0) initPayPal();
        }

        function render() {
            const container = document.getElementById('cart-items-container');
            const sidebar = document.getElementById('summary-sidebar');

            if (cart.length === 0) {
                sidebar.classList.add('hidden');
                container.innerHTML = `<div class="card-style py-20 text-center"><h2>Carrito vacío</h2></div>`;
            } else {
                sidebar.classList.remove('hidden');
                let total = cart.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);
                
                container.innerHTML = cart.map((item, idx) => `
                    <div class="card-style p-5 flex items-center gap-6">
                        <img src="${item.imagen_url}" class="w-20 h-20 object-contain">
                        <div class="flex-grow">
                            <h4 class="font-bold">${item.nombre}</h4>
                            <p class="text-blue-600 font-black">$${item.precio}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="changeQty(${idx}, -1)" class="w-8 h-8 bg-slate-100 rounded-lg">-</button>
                            <span class="font-bold">${item.cantidad}</span>
                            <button onclick="changeQty(${idx}, 1)" class="w-8 h-8 bg-slate-100 rounded-lg">+</button>
                        </div>
                    </div>
                `).join('');

                document.getElementById('total').innerText = `$${total.toFixed(2)}`;
                document.getElementById('subtotal').innerText = `$${total.toFixed(2)}`;
            }
        }

        // LÓGICA DE PAYPAL CONECTADA A SUPABASE
        function initPayPal() {
            const total = cart.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);

            paypal.Buttons({
                style: { layout: 'vertical', color: 'blue', shape: 'rect', label: 'pay' },
                createOrder: (data, actions) => {
                    return actions.order.create({
                        purchase_units: [{ amount: { value: total.toFixed(2) } }]
                    });
                },
                onApprove: (data, actions) => {
                    return actions.order.capture().then(async (details) => {
                        // AQUÍ GUARDAMOS EN TU BASE DE DATOS
                        const { data: { user } } = await sb.auth.getUser();
                        
                        const { error } = await sb.from('pedidos').insert([{
                            user_id: user ? user.id : null,
                            productos: cart,
                            total: total,
                            paypal_id: details.id,
                            estado: 'pagado'
                        }]);

                        if (!error) {
                            alert("¡Pago exitoso! Tu pedido ha sido registrado.");
                            localStorage.removeItem('farmaCart');
                            window.location.href = "catalog.html";
                        } else {
                            console.error(error);
                            alert("Pago capturado pero error al guardar reporte.");
                        }
                    });
                }
            }).render('#paypal-button-container');
        }

        window.changeQty = (idx, d) => {
            cart[idx].cantidad += d;
            if(cart[idx].cantidad < 1) cart.splice(idx, 1);
            localStorage.setItem('farmaCart', JSON.stringify(cart));
            location.reload(); // Recargamos para refrescar PayPal con el nuevo total
        }

        window.onload = init;
    </script>
</body>
</html>
