<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pedido - FarmaPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-['Plus_Jakarta_Sans'] text-slate-900">

    <header class="max-w-6xl mx-auto px-6 py-6 flex justify-between items-center">
        <a href="catalogo.html" class="flex items-center gap-2 text-blue-600 font-extrabold text-2xl">
            <span class="bg-blue-600 text-white p-1 rounded-lg">⚕️</span> FarmaPlus
        </a>
        
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-3 bg-white p-2 pr-5 rounded-2xl border border-slate-100 shadow-sm">
                <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600"><i data-lucide="user"></i></div>
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Sesión</p>
                    <p id="user-email" class="text-sm font-bold text-slate-700">Invitado</p>
                </div>
            </div>
            <button onclick="logout()" class="p-3 bg-red-50 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition-all shadow-sm">
                <i data-lucide="log-out" size="20"></i>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <div class="flex justify-between items-end mb-10">
            <h1 class="text-4xl font-black tracking-tight text-slate-900">Tu Carrito</h1>
            <a href="catalogo.html" class="text-blue-600 font-bold flex items-center gap-2 hover:underline">
                <i data-lucide="arrow-left" size="18"></i> Volver al catálogo
            </a>
        </div>

        <div id="cart-content" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div id="cart-items" class="lg:col-span-2 space-y-4"></div>
            
            <aside id="sidebar" class="hidden">
                <div class="bg-white p-8 rounded-[32px] border border-slate-100 shadow-xl sticky top-6">
                    <h3 class="text-xl font-black mb-6">Resumen</h3>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-slate-500 font-bold"><span>Subtotal</span><span id="sub-total">$0.00</span></div>
                        <div class="flex justify-between text-slate-500 font-bold"><span>Envío</span><span class="text-green-600">Gratis</span></div>
                        <div class="border-t pt-4 flex justify-between items-center"><span class="font-black text-lg">Total</span><span id="total" class="text-3xl font-black text-blue-600">$0.00</span></div>
                    </div>
                    <button onclick="pagar('Mercado Pago')" class="w-full bg-[#009EE3] text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-blue-100 mb-3">Pagar con Mercado Pago</button>
                    <button onclick="pagar('Efectivo')" class="w-full border-2 border-slate-100 text-slate-500 py-3 rounded-2xl font-bold hover:bg-slate-50 transition-all">Efectivo</button>
                </div>
            </aside>
        </div>
    </main>

    <script>
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bmduemRhdnd2cWNhY214dmp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTEyMDUsImV4cCI6MjA4ODI2NzIwNX0.8TkmNg9hpcj-JKnusmAa_uL0L1H6VgPbVQthFtDump4'; 
        const sb = supabase.createClient(_url, _key);

        let cart = JSON.parse(localStorage.getItem('farmaCart')) || [];

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) document.getElementById('user-email').innerText = user.email;
            render();
        }

        async function logout() {
            await sb.auth.signOut();
            window.location.href = "catalogo.html";
        }

        function render() {
            const container = document.getElementById('cart-items');
            const sidebar = document.getElementById('sidebar');

            if (cart.length === 0) {
                sidebar.classList.add('hidden');
                container.innerHTML = `
                    <div class="bg-white py-20 text-center rounded-[32px] border-2 border-dashed border-slate-200">
                        <i data-lucide="shopping-basket" class="text-blue-600 mx-auto mb-6" size="48"></i>
                        <h2 class="text-2xl font-black mb-6">Tu carrito está vacío</h2>
                        <a href="catalogo.html" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg inline-block">Ver Productos</a>
                    </div>`;
            } else {
                sidebar.classList.remove('hidden');
                let total = 0;
                container.innerHTML = cart.map((item, idx) => {
                    total += item.precio * item.cantidad;
                    return `
                        <div class="bg-white p-6 rounded-[32px] border border-slate-100 flex items-center gap-6 shadow-sm">
                            <img src="${item.imagen_url}" class="w-20 h-20 object-cover rounded-2xl">
                            <div class="flex-grow">
                                <h4 class="font-black text-lg">${item.nombre}</h4>
                                <p class="text-blue-600 font-bold">$${item.precio}</p>
                            </div>
                            <div class="flex items-center bg-slate-100 rounded-xl p-1">
                                <button onclick="change(${idx}, -1)" class="px-3 font-bold text-slate-400 hover:text-blue-600">-</button>
                                <span class="font-bold text-sm">${item.cantidad}</span>
                                <button onclick="change(${idx}, 1)" class="px-3 font-bold text-slate-400 hover:text-blue-600">+</button>
                            </div>
                        </div>`;
                }).join('');
                document.getElementById('total').innerText = `$${total.toFixed(2)}`;
                document.getElementById('sub-total').innerText = `$${total.toFixed(2)}`;
            }
            lucide.createIcons();
        }

        async function pagar(metodo) {
            const { data: { user } } = await sb.auth.getUser();
            const total = cart.reduce((acc, i) => acc + (i.precio * i.cantidad), 0);
            
            const { error } = await sb.from('pedidos').insert({
                usuario_email: user ? user.email : "Invitado",
                items: cart,
                total: total,
                metodo_pago: metodo
            });

            if (error) {
                alert("Error: Revisa que la tabla 'pedidos' exista en Supabase.");
            } else {
                alert("¡Pedido realizado!");
                localStorage.removeItem('farmaCart');
                window.location.href = "catalogo.html";
            }
        }

        window.change = (i, d) => {
            cart[i].cantidad += d;
            if(cart[i].cantidad < 1) cart.splice(i, 1);
            localStorage.setItem('farmaCart', JSON.stringify(cart));
            render();
        }

        window.onload = init;
    </script>
</body>
</html>
