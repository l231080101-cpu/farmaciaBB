<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pedido - FarmaPlus</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .cart-grid { display: grid; grid-template-columns: 1fr 380px; gap: 32px; }
        @media (max-width: 1024px) { .cart-grid { grid-template-columns: 1fr; } }
        
        /* Sombras idénticas a tu Panel Admin */
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body class="antialiased">

    <main class="max-w-7xl mx-auto px-6 py-16 min-h-screen flex flex-col">
        <div id="cart-header" class="mb-12">
            <h1 class="text-5xl font-extrabold tracking-tight text-slate-900 mb-3">Tu Carrito</h1>
            <p class="text-slate-500 text-lg">Gestiona tus productos y finaliza tu compra de forma segura.</p>
        </div>

        <div class="cart-grid flex-grow">
            <div id="cart-items-container" class="space-y-6 flex flex-col justify-center">
                </div>

            <aside id="order-summary-aside" class="relative">
                <div class="bg-white p-8 rounded-[40px] border border-slate-100 card-shadow sticky top-10">
                    <h3 class="text-2xl font-bold mb-8">Resumen de compra</h3>
                    
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-slate-500 font-medium">
                            <span>Subtotal</span>
                            <span id="cart-subtotal" class="text-slate-900 font-bold">$0.00</span>
                        </div>
                        <div class="flex justify-between text-slate-500 font-medium">
                            <span>Envío</span>
                            <span id="cart-shipping" class="text-green-600 font-bold">$0.00</span>
                        </div>
                        <div class="border-t border-slate-100 pt-6 flex justify-between items-end">
                            <span class="text-slate-900 font-bold">Total</span>
                            <span id="cart-total" class="text-4xl font-black text-blue-600">$0.00</span>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <button onclick="openPaymentModal()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-extrabold text-lg shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95 flex items-center justify-center gap-3">
                            <i data-lucide="credit-card"></i> Pagar Ahora
                        </button>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN SUPABASE
        const _url = 'https://ftngnzdavwvqcacmxvjw.supabase.co';
        const _key = 'TU_LLAVE_ANON_AQUI'; // Asegúrate de pegar tu llave real
        const sb = supabase.createClient(_url, _key);

        let cart = JSON.parse(localStorage.getItem('farmaCart')) || [];

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const summaryAside = document.getElementById('order-summary-aside');
            const header = document.getElementById('cart-header');
            const subtotalEl = document.getElementById('cart-subtotal');
            const shippingEl = document.getElementById('cart-shipping');
            const totalEl = document.getElementById('cart-total');

            // --- CASO 1: CARRITO VACÍO (CENTRADÍSIMO) ---
            if (cart.length === 0) {
                if(summaryAside) summaryAside.classList.add('hidden'); 
                
                // Centramos el contenedor ocupando todo el ancho
                container.style.gridColumn = "1 / -1"; 

                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-center py-20 px-6">
                        <div class="w-48 h-48 bg-blue-50 rounded-full flex items-center justify-center mb-10 animate-float">
                             <i data-lucide="shopping-basket" class="text-blue-600" size="80"></i>
                        </div>
                        <h2 class="text-5xl font-black text-slate-900 mb-6 tracking-tight">Tu carrito está vacío</h2>
                        <p class="text-slate-500 mb-12 max-w-lg text-xl leading-relaxed">
                            Parece que aún no has añadido ninguna medicina o producto a tu pedido. 
                            ¡Vuelve al catálogo para ver nuestras ofertas!
                        </p>
                        <a href="catalogo.html" class="bg-blue-600 text-white px-14 py-6 rounded-[24px] font-black text-2xl shadow-2xl shadow-blue-200 hover:bg-blue-700 hover:-translate-y-2 transition-all flex items-center gap-4">
                            <i data-lucide="layout-grid" size="28"></i> Ir al Catálogo
                        </a>
                    </div>`;
                lucide.createIcons();
                return;
            }

            // --- CASO 2: CARRITO CON PRODUCTOS ---
            summaryAside.classList.remove('hidden');
            container.style.gridColumn = "auto";
            container.classList.remove('justify-center');
            
            let subtotal = 0;
            container.innerHTML = cart.map((item, index) => {
                const itemTotal = item.precio * item.cantidad;
                subtotal += itemTotal;
                return `
                    <div class="bg-white p-8 rounded-[32px] border border-slate-100 card-shadow flex items-center gap-8 transition-all hover:scale-[1.01]">
                        <img src="${item.imagen_url || 'https://via.placeholder.com/150'}" class="w-32 h-32 object-cover rounded-[24px] bg-slate-50">
                        <div class="flex-grow">
                            <h3 class="font-black text-2xl text-slate-900 mb-2">${item.nombre}</h3>
                            <div class="flex items-center gap-6">
                                <div class="flex items-center bg-slate-100 rounded-2xl p-1">
                                    <button onclick="updateQty(${index}, -1)" class="w-10 h-10 font-bold hover:bg-white rounded-xl transition">-</button>
                                    <span class="w-12 text-center font-black text-lg">${item.cantidad}</span>
                                    <button onclick="updateQty(${index}, 1)" class="w-10 h-10 font-bold hover:bg-white rounded-xl transition">+</button>
                                </div>
                                <span class="text-blue-600 font-black text-xl">$${item.precio}</span>
                            </div>
                        </div>
                        <div class="text-right flex flex-col items-end gap-3">
                            <span class="text-2xl font-black text-slate-900">$${itemTotal.toFixed(2)}</span>
                            <button onclick="removeItem(${index})" class="text-red-400 hover:text-red-600 p-2 hover:bg-red-50 rounded-xl transition">
                                <i data-lucide="trash-2"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            const shipping = subtotal > 1500 ? 0 : 99;
            subtotalEl.innerText = `$${subtotal.toFixed(2)}`;
            shippingEl.innerText = shipping === 0 ? "¡Gratis!" : `$${shipping.toFixed(2)}`;
            totalEl.innerText = `$${(subtotal + shipping).toFixed(2)}`;
            
            lucide.createIcons();
        }

        window.updateQty = (index, change) => {
            cart[index].cantidad += change;
            if (cart[index].cantidad < 1) cart[index].cantidad = 1;
            save();
        };

        window.removeItem = (index) => {
            cart.splice(index, 1);
            save();
        };

        function save() {
            localStorage.setItem('farmaCart', JSON.stringify(cart));
            renderCart();
        }

        window.onload = () => {
            renderCart();
            lucide.createIcons();
        };
    </script>
</body>
</html>
